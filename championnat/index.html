     jamais en local (file://, localhost) ni dans le harnais Node sans DOM. -->
<script type="text/javascript">

      !/^(localhost|127\.0\.0\.1|0\.0\.0\.0)$/.test(location.hostname)) {
    var gc = document.createElement("script");
    gc.async = true;
    gc.src = "//gc.zgo.at/count.js";

<style>
  :root{
    --bg:#0b1626; --panel:#10233f; --panel2:#0e1d35; --line:#27466e;
    --txt:#d9e4f2; --dim:#7e96b5; --jaune:#ffd24a; --vert:#5fd98f;
    --rouge:#ff6f61; --cyan:#6fd6e8;
    --font-ui:'VT323','Lucida Console','Courier New',monospace;
    --font-led:'Silkscreen','VT323',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:var(--font-ui);
    font-size:17px; line-height:1.35;
  }
  #app{max-width:980px; margin:0 auto; padding:8px 10px 60px;}
  /* ---- barre de titre façon CM ---- */
  .topbar{
    background:var(--jaune); color:#16243c; font-weight:bold;
    padding:5px 10px; letter-spacing:1px; display:flex; flex-wrap:wrap;
    justify-content:space-between; gap:4px 16px; margin-bottom:6px;
  }
  .topbar .r{font-weight:normal;}
  nav{display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px;}
  nav button{
    background:var(--panel); color:var(--txt); border:1px solid var(--line);
    font-family:inherit; font-size:16px; padding:6px 12px; cursor:pointer;
  }
  nav button.on{background:var(--jaune); color:#16243c; font-weight:bold; border-color:var(--jaune);}
  nav button:focus-visible{outline:2px solid var(--cyan);}
  .panel{background:var(--panel); border:1px solid var(--line); padding:10px 12px; margin-bottom:8px;}
  h2{color:var(--jaune); font-size:17px; letter-spacing:1px; margin-bottom:8px; text-transform:uppercase;}
  h3{color:var(--cyan); font-size:15px; margin:10px 0 4px;}
  table{width:100%; border-collapse:collapse; font-size:16px;}
  th{color:var(--dim); text-align:left; font-weight:normal; border-bottom:1px solid var(--line); padding:2px 6px;}
  td{padding:2px 6px; border-bottom:1px solid rgba(39,70,110,.35);}
  tr.me td{color:var(--jaune);}
  tr.click{cursor:pointer;}
  tr.click:hover td{background:var(--panel2);}
  .num{text-align:right;}
  .ctr{text-align:center;}
  .pos-G{color:var(--cyan);} .pos-D{color:#9fc1ec;} .pos-M{color:#cfe3a8;} .pos-A{color:#ffb3a0;}
  .vert{color:var(--vert);} .rouge{color:var(--rouge);} .jaune{color:var(--jaune);} .dim{color:var(--dim);}
  button.act{
    background:var(--panel2); border:1px solid var(--line); color:var(--txt);
    font-family:inherit; font-size:16px; padding:4px 10px; cursor:pointer;
  }
  button.act:hover{border-color:var(--jaune); color:var(--jaune);}
  button.act:disabled{opacity:.4; cursor:default;}
  button.big{font-size:18px; padding:8px 18px; background:var(--jaune); color:#16243c; font-weight:bold; border:none;}
  /* moment de match : une fois le choix tranché, la décision retenue s'illumine (✅) et les autres s'effacent */
  .zPen.choisi, .zChoix.choisi{background:var(--jaune)!important; color:#16243c!important; border:1px solid var(--jaune)!important; font-weight:bold; opacity:1!important;}
  .zPen.ecarte, .zChoix.ecarte{background:#0b1626!important; border:1px solid #6b5a22!important; color:var(--dim)!important; opacity:.55!important;}
  /* ---- téléscripteur ---- */
  #ticker{
    background:#060d18; border:1px solid var(--line); min-height:240px; max-height:340px;
    overflow-y:auto; padding:10px 12px; font-size:16px;
    clear:both; /* le téléscripteur passe sous les contrôles de vitesse flottants — sinon il se rétrécit à côté (BFC vs float) */
  }
  #ticker p{margin:0 0 3px; white-space:pre-wrap;}
  #ticker .evt{display:flex; align-items:flex-start; gap:7px;}
  #ticker .tx{flex:1;}
  #ticker .ico{flex:0 0 26px; padding-top:1px;}
  #ticker .ico svg{width:24px; height:17px; display:block;}
  #ticker .min{color:var(--dim);}
  #ticker .but{color:var(--jaune); font-weight:bold;}
  #ticker .occ{color:var(--cyan);}
  #ticker .crd{color:var(--rouge);}
  #ticker .sys{color:var(--vert);}
  .cursor::after{content:"▌"; animation:cl 1s steps(1) infinite; color:var(--vert);}
  @keyframes cl{50%{opacity:0;}}
  @media (prefers-reduced-motion:reduce){.cursor::after{animation:none;}}
  /* ---- célébration de but : panneau d'affichage LED clignotant ---- */
  #butFlash{position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
    background:rgba(4,9,18,.55); pointer-events:none;}
  #butFlash .led{font-family:'Courier New',monospace; font-weight:bold; text-align:center; padding:24px 34px;
    min-width:min(560px,92vw); max-width:min(640px,92vw); box-sizing:border-box; cursor:pointer;
    background:#0a0610; background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px); background-size:6px 6px;
    border:4px solid #2a2a2a; border-radius:6px; box-shadow:0 0 60px rgba(0,0,0,.85), inset 0 0 28px rgba(0,0,0,.6);}
  #butFlash .gros{font-family:var(--font-led); font-size:42px; letter-spacing:3px; color:var(--jaune); line-height:1.15;
    text-shadow:0 0 2px currentColor, 0 1px 0 rgba(0,0,0,.6); animation:butflash .4s steps(1) infinite;}
  #butFlash .det{font-size:21px; color:#fff; margin-top:12px; letter-spacing:1px;}
  /* nom du buteur en capitales blanches sous la ligne de score, façon tableau d'affichage (CANTONA 56' ⚽) */
  #butFlash .buteur{font-family:var(--font-led); font-size:24px; color:#fff; letter-spacing:2px; margin-top:10px;
    text-transform:uppercase; text-shadow:0 0 2px currentColor, 0 1px 0 rgba(0,0,0,.6);}
  /* le texte d'explication du but est aligné à GAUCHE et plus gros : on y lit qui a marqué, plus lisible qu'en pavé centré */
  #butFlash .dettxt{font-size:18px; color:var(--cyan); margin:12px auto 0; line-height:1.55; text-align:left;
    max-width:540px; background:rgba(111,214,232,.07); border-left:3px solid var(--cyan); padding:8px 12px; border-radius:3px;}
  #butFlash .hint{font-size:13px; color:var(--dim); margin-top:12px; letter-spacing:1px;}
  #butFlash.contre .gros{color:var(--rouge);}
  #butFlash .vignette{position:relative; line-height:0; border:2px solid #2a2a2a; border-radius:4px; overflow:hidden; margin:0 auto;}
  #butFlash .vimg{display:block; width:100%; max-width:min(360px,80vw); height:auto; image-rendering:pixelated;}
  #butFlash .bandeau{position:absolute; left:0; right:0; top:0; padding:8px 12px 22px; line-height:1.1;
    background:linear-gradient(to bottom, rgba(4,9,18,.9) 35%, rgba(4,9,18,0));}
  #butFlash .bandeau .gros{font-size:30px; letter-spacing:2px; text-shadow:0 0 2px currentColor, 0 2px 3px rgba(0,0,0,.95);}
  #butFlash .bandeau .det{margin-top:6px; text-shadow:0 1px 3px rgba(0,0,0,.95);}
  .momImg{display:block; margin:0 auto 8px; width:auto; max-width:100%; max-height:200px; image-rendering:pixelated;
    border:2px solid #2a2a2a; border-radius:4px;}
  @keyframes butflash{50%{opacity:.2;}}
  @media (prefers-reduced-motion:reduce){#butFlash .gros{animation:none;}}
  @media(max-width:700px){ #butFlash .gros{font-size:26px; letter-spacing:2px;} #butFlash .led{padding:14px 18px;}
    #butFlash .bandeau .gros{font-size:24px;} #butFlash .buteur{font-size:20px;} }
  .scoreline{font-family:var(--font-led); font-size:16px; color:var(--jaune); text-align:center; padding:6px 0; letter-spacing:1px;}
  .row{display:flex; flex-wrap:wrap; gap:8px; align-items:center;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  @media(max-width:700px){.grid2{grid-template-columns:1fr;}}
  select,input[type=text]{
    background:var(--panel2); border:1px solid var(--line); color:var(--txt);
    font-family:inherit; font-size:16px; padding:4px 6px;
  }
  .startclub{
    display:block; width:100%; text-align:left; margin-bottom:4px;
    background:var(--panel2); border:1px solid var(--line); color:var(--txt);
    font-family:inherit; font-size:16px; padding:7px 10px; cursor:pointer;
  }
  .startclub:hover{border-color:var(--jaune);}
  .startclub b{color:var(--jaune);}
  .badge{display:inline-block; border:1px solid var(--line); padding:0 6px; color:var(--dim); font-size:14px;}
  #fiche{position:fixed; inset:0; background:rgba(4,9,18,.82); display:none; align-items:center; justify-content:center; padding:16px;}
  #fiche .card{background:var(--panel); border:2px solid var(--jaune); max-width:460px; width:100%; padding:14px 16px;}
  .footer{color:var(--dim); font-size:14px; text-align:center; margin-top:14px;}

/* tableau d'affichage */
#tabScore{display:flex;align-items:center;justify-content:center;gap:12px}
.tSc{font-family:var(--font-led);font-size:34px;font-weight:bold;color:var(--jaune);min-width:52px;text-align:center;
     background:#060d18;border:1px solid var(--line);padding:0 8px;line-height:1.35}
.tSep{font-family:var(--font-led);color:var(--dim);font-size:22px}
.tNom{font-size:17px;color:#e8e8e8;max-width:230px}
#tabButs{display:flex;gap:18px;margin-top:6px}
#tabButs .tCol{flex:1;font-size:14px;color:var(--dim)}
#tabButs .tCol.d{text-align:right}
.fmatch{border:1px solid var(--line);background:rgba(255,255,255,.025);padding:10px;margin-top:10px}

/* ---------- mobile ---------- */
@media(max-width:700px){
  body{font-size:15px}
  .wrap{padding:4px}
  .topbar{flex-wrap:wrap;gap:2px;padding:6px 8px}
  .topbar .r{font-size:12px;width:100%}
  nav{display:flex;flex-wrap:wrap;gap:3px}
  nav button{flex:1 1 30%;padding:9px 2px;font-size:12px;letter-spacing:0}
  .panel{padding:8px;overflow-x:auto}
  table{min-width:540px}
  table.fit{min-width:0} /* tables clé/valeur étroites : tiennent dans l'écran, pas de scroll horizontal */
  .panel table{font-size:13px}
  .tSc{font-size:24px;min-width:36px;padding:0 4px}
  .tNom{font-size:13px;max-width:90px}
  #tabScore{gap:5px}
  #ctlVitesse{float:none !important;display:block;margin-top:6px} /* les contrôles de vitesse sur leur propre ligne, plein écran */
  #ticker{font-size:13px;max-height:280px}
  .fbox{max-width:94vw !important;padding:10px !important}
  .fbox #cage, .fbox div[style*="width:330px"]{width:100% !important}
  .big{display:block;width:100%;margin:6px 0}
  .scoreline{font-size:13px !important;flex-wrap:wrap}
  .zPen{padding:12px 2px !important;font-size:12px}
  .act{padding:7px 8px}
}
</style>

function genJoueur(pos, prestige){
  const base = 58 + prestige*2.2;
  const age  = RNDI(19,32);
  let note = Math.round(Math.min(86, Math.max(52, base + RND(-7,7))));
  if(age<=22) note = Math.max(52, note - RNDI(5,10)); // un jeune anonyme est brut, pas fini
  let pot = note;
  if(age<=22 && Math.random()<0.30) pot = Math.min(89, note + RNDI(5,14)); // pépites procédurales
  else if(age<=24) pot = note + RNDI(0,3);
  const nomC=PICK(PRENOMS)+" "+PICK(NOMS);
  const j={nom:nomC, pos, age, note, pot,
           moral:RNDI(55,75), sansJouer:0, nat:"FR", histoire:genHistoire(nomC)};
  initTraits(j);
  return j;
}

function initTraits(j){
  if(j.ego==null)    j.ego    = Math.max(1, RNDI(1,6) + (j.note>=85?RNDI(1,4):0));
  if(j.agress==null) j.agress = Math.max(1, RNDI(0,6)+RNDI(0,4));
  if(j.fragile==null)j.fragile= Math.max(1, RNDI(0,6)+RNDI(0,4));
  if(j.venal==null)  j.venal  = Math.max(1, RNDI(0,6)+RNDI(0,4));
  const t=TRAITS[j.nom];
  if(t){ j.ego=t.ego; j.agress=t.agress; j.fragile=t.fragile; j.venal=t.venal; }
  if(BOUCHERS[j.nom]!=null) j.agress=BOUCHERS[j.nom]; // boucher notoire : agressivité au maximum
  j.ego=Math.min(10,j.ego); j.agress=Math.min(10,j.agress); j.fragile=Math.min(10,j.fragile); j.venal=Math.min(10,j.venal);
  // don RARE des coups de pied arrêtés (penaltys + coups francs) : réservé aux bons milieux/attaquants, peu fréquent ;
  // un vrai roi du coup franc (TIREURS_CF) l'a d'office, quelle que soit sa note
  if(j.tireurElite==null) j.tireurElite = ((t&&t.tireur)||TIREURS_CF.has(j.nom)) ? true : ("MA".includes(j.pos||"") && (j.note||0)>=79 && Math.random()<0.09);
}

function construitDivision(listeClubs, starsMap){
  const clubs = listeClubs.map(c=>({...c, joueurs:[], pts:0,j:0,g:0,n:0,p:0,bp:0,bc:0, forme:[]}));
  for(const c of clubs){
    const stars=(starsMap[c.id]||[]).map(s=>({nom:s[0],pos:s[1],age:s[2],note:s[3],pot:s[4]}));
    c.joueurs=stars;
    for(const pos of ["G","D","M","A"]){
      while(c.joueurs.filter(j=>j.pos===pos).length < CIBLE[pos]) c.joueurs.push(genJoueur(pos,c.pres));
    }
    c.joueurs.forEach(j=>{ j.club=c.id; j.avendre=false; j.buts=0; j.passes=0; j.matchs=0; j.note0=j.note; j.fav=false; j.titu=false; j.uid=uidGen(); j.bless=0; j.susp=0; j.reel=!j.histoire; j.nat=j.nat||"FR"; j.moral=j.moral==null?RNDI(58,75):j.moral; j.sansJouer=0; initTraits(j); });
  }
  for(const c of clubs){ // bête noire (jamais le rival, autre registre)
    const autres=clubs.filter(x=>x.id!==c.id && x.id!==(RIVAL[c.id]||""));
    c.beteNoire=PICK(autres).id; c.bnBattue=false;
  }
  return clubs;
}

/* ---------- Calendrier : tables de Berger, aller-retour ---------- */
function berger(ids){
  const n=ids.length, list=ids.slice(), rounds=[];
  for(let r=0;r<n-1;r++){
    const day=[];
    for(let i=0;i<n/2;i++){
      const a=list[i], b=list[n-1-i];
      day.push(r%2===0 ? [a,b] : [b,a]);
    }
    rounds.push(day);
    list.splice(1,0,list.pop());
  }
  const retour=rounds.map(d=>d.map(([a,b])=>[b,a]));
  return rounds.concat(retour); // 38 journées
}

const FORMATION={G:1,D:4,M:4,A:2};
/* Consigne d'avant-match : modulateur d'agressivité appliqué au SEUL match du joueur.
   att = votre attaque, adv = l'attaque adverse contre vous. Offensif marque plus mais expose ; prudent verrouille. */
// prime de match : niveaux activables AVANT le match, payés seulement en cas de victoire (cf. finirJournee)
const PRIMES_MATCH=[{v:0,label:"Aucune"},{v:0.10,label:"+10 %"},{v:0.20,label:"+20 %"},{v:0.30,label:"+30 %"}];

  offensif: {att:1.15, adv:1.15, label:"Offensif",  desc:"On pousse l'attaque : plus d'occasions, mais on laisse des espaces derrière."}
};
function dispo(j){ return !(j.bless>0) && !(j.susp>0) && !j._reposIncident; }
function onze(c){
  const xi=[];
  for(const p of ["G","D","M","A"]){
    const pool=c.joueurs.filter(j=>j.pos===p && dispo(j));
    const forces=pool.filter(j=>j.titu).sort((a,b)=>b.note-a.note).slice(0,FORMATION[p]);
    const reste=pool.filter(j=>!forces.includes(j)).sort((a,b)=>b.note-a.note);
    xi.push(...forces, ...reste.slice(0, FORMATION[p]-forces.length));
  }
  if(xi.length<11){ // effectif décimé : on complète hors poste — un joueur de champ AVANT tout 2e gardien (un gardien ne dépanne qu'en tout dernier recours)
    const restants=c.joueurs.filter(j=>dispo(j)&&!xi.includes(j)).sort((a,b)=>((a.pos==="G")-(b.pos==="G"))||(b.note-a.note));
    xi.push(...restants.slice(0, 11-xi.length));
  }
  return xi;
}
/* Le onze RÉELLEMENT aligné en coupe selon votre rotation : « cadres » = les meilleurs (= onze),
   « réserve » = on titularise les remplaçants (les moins bien notés à chaque poste), « mixte » = moitié-moitié.
   Sert à l'affichage du tour de coupe (buteurs, gardien) pour que la réserve fasse vraiment jouer d'autres
   noms — retour de playtest : « on envoie la réserve mais ce sont les mêmes joueurs qui jouent ». */
function onzeRotation(c, rot){
  if(rot!=="reserve" && rot!=="mixte") return onze(c); // cadres (ou défaut) : le meilleur onze
  const xi=[];
  for(const p of ["G","D","M","A"]){
    const pool=c.joueurs.filter(j=>j.pos===p && dispo(j)).sort((a,b)=>b.note-a.note);
    const n=FORMATION[p];
    let sel;
    if(rot==="reserve"){ sel=pool.slice(-n); }                    // les moins bien notés disponibles : les remplaçants jouent
    else { const haut=Math.ceil(n/2);                             // mixte : moitié cadres, moitié réserve
      sel=pool.slice(0,haut).concat(pool.slice(haut).reverse().slice(0, n-haut)); }
    xi.push(...sel);
  }
  if(xi.length<11){
    const restants=c.joueurs.filter(j=>dispo(j)&&!xi.includes(j)).sort((a,b)=>((a.pos==="G")-(b.pos==="G"))||(a.note-b.note));
    xi.push(...restants.slice(0, 11-xi.length));
  }
  return xi;
}
function onzeCoupe(c){ // le onze de coupe affiché : pour VOTRE club, il suit la rotation choisie
  return (G.coupe && c && c.id===G.monClub) ? onzeRotation(c, G.coupe.rotation) : onze(c);
}
/* Qualité de meneur d'un joueur : expérience (âge) × autorité (ego) × respect (note) ×
   intégrité (vénalité), le tout modulé par sa forme du moment (moral = investissement). */
function leadership(j){
  if(!j) return 0;
  const age=j.age||25, ego=j.ego||5, note=j.note||60, venal=j.venal||5, moral=(j.moral==null?65:j.moral);
  const expF =Math.max(0,Math.min(1,(age-21)/9));   // 21 ans → 0, 30 ans et + → 1
  const autF =Math.max(0,Math.min(1,(ego-2)/6));    // un meneur a de la présence (ego)
  const respF=Math.max(0,Math.min(1,(note-58)/30)); // on suit les meilleurs (note)
  const intF =Math.max(0,Math.min(1,(8-venal)/6));  // un mercenaire inspire moins (vénalité)
  const base =0.32*expF + 0.30*autF + 0.28*respF + 0.10*intF; // ∈ [0,1]
  return base*(0.85+0.30*(moral/100)); // ~×1.05 à 65 de moral, ×1.15 à fond, ×0.97 en berne
}
function capitaineDuXI(xi){ // le capitaine désigné s'il est sur la pelouse, sinon le meneur naturel
  return xi.find(j=>j.capitaine) || xi.slice().sort((a,b)=>leadership(b)-leadership(a))[0] || null;
}
function tireurDuXI(xi){ // le tireur d'élite (coups francs/penaltys) s'il est sur la pelouse, sinon le meilleur frappeur
  if(!xi||!xi.length) return null;
  return xi.find(j=>j.tireurElite) || xi.filter(j=>"MA".includes(j.pos)).sort((a,b)=>b.note-a.note)[0] || xi[0] || null;
}
function forces(c){
  const xi=onze(c);
  let exces=0; xi.forEach(j=>{ if((j.ego||5)>=8) exces+=(j.ego-7); });
  const L=leadership(capitaineDuXI(xi)); // qualité du capitaine effectif (0..~1,15)
  let coh=Math.max(0.85, 1-0.012*exces*(1-0.40*L)); // un fort capitaine tempère les divas
  coh*=1+(L-0.68)*0.05;                              // et soude (ou non) le vestiaire : ±~2 %
  coh=Math.max(0.84, Math.min(1.03, coh));
  const eff=j=>j.note*(0.95+0.001*(j.moral==null?65:j.moral)); // le moral fait ±5 %
  let att=xi.filter(j=>"MA".includes(j.pos)).reduce((s,j)=>s+eff(j),0)/6*coh;
  if(xi.some(j=>j.tireurElite)) att*=1.03; // un tireur d'élite (coups de pied arrêtés) pèse sur le total de buts
  const def=xi.filter(j=>"GD".includes(j.pos)).reduce((s,j)=>s+eff(j),0)/5*coh;
  return {att,def,xi,coh};
}
/* garantit que MON club a toujours un capitaine valide (départ, retraite, vieille sauvegarde) */
function assureCapitaine(){
  const c=clubById(G.monClub); if(!c||!c.joueurs.length) return;
  if(c.joueurs.some(j=>j.capitaine)) return; // brassard déjà attribué
  const cand=c.joueurs.slice().sort((a,b)=>leadership(b)-leadership(a))[0];
  if(cand){ cand.capitaine=true;
    if((G.journee||0)>0) notif("©️ Brassard vacant : "+cand.nom+" est nommé capitaine par défaut."); }
}
function libLeadership(j){
  const L=leadership({...j, moral:65}); // étoffe intrinsèque, hors forme du moment
  if((j.age||25)<23) return "encore un peu jeune pour le brassard";
  if((j.ego||5)>=9 && L<0.75) return "du caractère, mais il divise le vestiaire";
  if(L>=0.80) return "un meneur d'hommes né";
  if(L>=0.64) return "a clairement l'étoffe d'un capitaine";
  if(L>=0.48) return "ferait un capitaine discret";
  return "peu d'ascendant sur le groupe";
}

function quelconque(c){ return PICK(onze(c)); }
function tireur(c){
  const xi=onze(c), att=xi.filter(j=>"MA".includes(j.pos));
  const pond=att.map(j=>j.pos==="A"?j.note*2:j.note);
  let t=Math.random()*pond.reduce((a,b)=>a+b,0);
  for(let i=0;i<att.length;i++){ t-=pond[i]; if(t<=0) return att[i]; }
  return att[att.length-1];
}
function passeur(c, buteur){
  if(Math.random()<0.28) return null; // but sans passe décisive
  const xi=onze(c).filter(j=>j!==buteur && j.pos!=="G");
  const pond=xi.map(j=>j.pos==="M"?j.note*2:(j.pos==="A"?j.note*1.4:j.note*0.5));
  let t=Math.random()*pond.reduce((a,b)=>a+b,0);
  for(let i=0;i<xi.length;i++){ t-=pond[i]; if(t<=0) return xi[i]; }
  return null;
}
function marque(c, sh, sa, verbeux, ev, m, prefixe){
  const j=tireur(c), p=passeur(c,j);
  j.buts++; if(p) p.passes++;
  // uid/pasUid : permettent d'annuler proprement un but pré-tiré si la tactique change en cours de match (cf. rejoueDepuis)
  if(verbeux) ev.push({m,t:"but",ic:"but",g:{cote:c.id,but:j.nom,pas:p?p.nom:null,sh,sa,uid:j.uid,pasUid:p?p.uid:null},
    x:fmtC(PICK(COMM.but),j,c)+(p?" Passe décisive de "+p.nom+".":"")+"  "+prefixe});
}
/* Commentaire lié au nombre de buts d'un joueur dans le match : doublé, triplé… et le COUP DU CHAPEAU
   (trois buts d'affilée, sans qu'un autre joueur — coéquipier ou adversaire — n'ait marqué entre-temps). */
function comButs(nom, nb, chapeau){
  if(chapeau) return "🎩 COUP DU CHAPEAU POUR "+nom.toUpperCase()+" !";
  if(nb===2) return "Le doublé pour "+nom+" !";
  if(nb===3) return "Triplé de "+nom+" !";
  if(nb===4) return "Oh la la, le quadruplé de "+nom+" !";
  if(nb===5) return "Et de cinq pour "+nom+"… Incroyable !";
  if(nb>=6) return "Et de "+nb+" pour "+nom+"… du jamais vu !";
  return "";
}
/* Post-traitement de la liste d'évènements (chronologique) : annote chaque but du décompte du buteur dans le
   match (g.nb), du flag coup du chapeau (g.chapeau), et glisse le commentaire dans le téléscripteur (e.x).
   Idempotent (garde-fou _com) pour survivre à une re-simulation tactique (rejoueDepuis annote à nouveau la liste
   recollée — nb/chapeau recalculés sur tout le fil, sans dupliquer le texte des lignes déjà commentées). */
function annoteButs(ev){
  let prevKey=null, streak=0; const compte={};
  for(const e of ev){ if(!e.g) continue;
    const key=e.g.uid||e.g.but;
    const nb=(compte[key]=(compte[key]||0)+1);
    streak=(key===prevKey)?streak+1:1; prevKey=key;
    const chapeau=(streak===3);
    e.g.nb=nb; e.g.chapeau=chapeau;
    if(!e.g._com){ const com=comButs(e.g.but, nb, chapeau); if(com){ e.g._com=com; e.x=e.x+"  "+com; } }
  }
}

function titreBut(g, contre){
  if(g.chapeau) return "🎩 COUP DU CHAPEAU !";
  if(g.nb===2) return "⚽⚽ DOUBLÉ !";
  if(g.nb===3) return "⚽⚽⚽ TRIPLÉ !";
  if(g.nb===4) return "QUADRUPLÉ !!!";
  if(g.nb>=5) return "⚽×"+g.nb+" — DÉCHAÎNÉ !";
  return contre?"BUT…":"⚽ BUT !";
}
function agressif(c){
  const xi=onze(c);
  const pond=xi.map(j=>1+((j.agress||5)-1)*0.55);
  let t=Math.random()*pond.reduce((a,b)=>a+b,0);
  for(let i=0;i<xi.length;i++){ t-=pond[i]; if(t<=0) return xi[i]; }
  return xi[xi.length-1];
}
function simuleMatch(home,away,verbeux){
  const fh=forces(home), fa=forces(away);
  // ferveur du public : un stade plein pousse l'équipe à domicile et gêne le visiteur ; un stade clairsemé pèse.
  // Centrée sur ~62 % de remplissage (la moyenne) → l'avantage du terrain moyen reste celui d'avant : calibrage préservé,
  // car ce que le domicile gagne en attaque, le visiteur le perd à peu près à l'identique (somme des buts ≈ constante).
  const aff=affluence(home,away);
  const fill=Math.min(1, aff/Math.max(1,home.cap));
  let ferveur=1+0.18*(fill-0.62);
  if(home.id===G.monClub && G.stade && G.stade.toit) ferveur+=0.025; // un stade couvert rugit : léger bonus d'ambiance à domicile (votre match seul → calibrage préservé)
  let lh=Math.max(.25, 2.45*Math.pow(fh.att/fa.def,2.5)*1.18*ferveur);
  let la=Math.max(.20, 2.45*Math.pow(fa.att/fh.def,2.5)*0.92*(2-ferveur));
  // consigne d'avant-match : n'affecte QUE votre match (neutre partout ailleurs → calibrage intact)
  if(home.id===G.monClub||away.id===G.monClub){
    const C=CONSIGNES[G.consigne]||CONSIGNES.equilibre;
    if(home.id===G.monClub){ lh*=C.att; la*=C.adv; } else { la*=C.att; lh*=C.adv; }
    // prime de match : les joueurs se transcendent pour la prime (boost d'attaque). Elle n'est PAYÉE qu'en cas de
    // victoire (finirJournee), à activer match par match. Défaut 0 → neutre, le harnais n'y touche pas (calibrage intact).
    const pm=+G.primeMatch||0;
    if(pm>0){ if(home.id===G.monClub) lh*=(1+pm); else la*=(1+pm); }
    // staff technique : bonus sectoriels de VOTRE match seul (neutre sans coach, et vide au harnais → calibrage intact)
    const cAtt=1+0.02*coachTier("attaque"), cDef=1-0.02*coachTier("defense"), cGk=1-0.015*coachTier("gardien");
    if(home.id===G.monClub){ lh*=cAtt; la*=cDef*cGk; } else { la*=cAtt; lh*=cDef*cGk; }
  }
  // fatigue de coupe : aligner ses cadres en semaine laisse des jambes lourdes au match suivant
  // (VOTRE match uniquement, et seulement si fatigue>0 → le calibrage du championnat reste intact)
  if(G.coupe && G.coupe.fatigue>0){ if(home.id===G.monClub) lh*=0.95; else if(away.id===G.monClub) la*=0.95; }
  // bête noire : l'adversaire maudit joue toujours bien contre vous (jusqu'à ce que le sort soit brisé)
  if(home.beteNoire===away.id && !home.bnBattue) la*=1.12;
  if(away.beteNoire===home.id && !away.bnBattue) lh*=1.12;
  const derby=(RIVAL[home.id]===away.id);
  if(home._coupTordu && home.id===G.monClub){ la*=0.90; home._coupTordu=false; } // vestiaire saboté : l'adversaire démarre patraque
  let mulH=1, mulA=1; // infériorité numérique : un rouge plombe l'équipe réduite pour les minutes restantes
  let sh=0, sa=0; const ev=[];
  if(verbeux) ev.push({m:0,t:"sys",x:(derby?nomRivalite(home.id,away.id).toUpperCase()+" ! ":"")+"Coup d'envoi à "+home.stade+" devant "+FMT(aff)+" spectateurs."});
  for(let m=1;m<=90;m++){
    const elh=lh*mulH, ela=la*mulA; // attaques effectives, révisées à la baisse pour l'équipe à dix
    const r=Math.random();
    if(r < elh/90){ // évènement côté domicile
      if(Math.random()<0.42){ sh++; marque(home,sh,sa,verbeux,ev,m,"("+home.id+" "+sh+"-"+sa+")"); }
      else if(verbeux&&Math.random()<.7){
        const arr=Math.random()<.5, tir=tireur(home);
        ev.push({m,t:"occ",ic:arr?"arret":"rate",x:fmtC(PICK(arr?COMM.arret:COMM.rate),tir,away),
          q:{but:tir.nom,cote:home.id,bu:Math.random()<MONTEE_RATEE}}); // q = de quoi monter le suspense avant une occasion qui peut ne rien donner
      }
    } else if(r < (elh+ela)/90){
      if(Math.random()<0.42){ sa++; marque(away,sh,sa,verbeux,ev,m,"("+home.id+" "+sh+"-"+sa+")"); }
      else if(verbeux&&Math.random()<.7){
        const arr=Math.random()<.5, tir=tireur(away);
        ev.push({m,t:"occ",ic:arr?"arret":"rate",x:fmtC(PICK(arr?COMM.arret:COMM.rate),tir,home),
          q:{but:tir.nom,cote:away.id,bu:Math.random()<MONTEE_RATEE}});
      }
    } else if(verbeux && Math.random()<0.028){
      ev.push({m,t:"amb",x:PICK(COMM.amb)});
    }
    if(verbeux && Math.random()<(derby?0.055:0.030)){ // discipline (le derby chauffe les esprits)
      const cote=Math.random()<.5?home:away, j=agressif(cote), gardien=(j.pos==="G");
      const rouge=Math.random()<Math.min(0.25, 0.025+0.014*((j.agress||5)-3));
      if(rouge){

        const dDef=gardien?1.34:1.18; // un de moins : on attaque moins, on encaisse plus — sans gardien, la cage est une passoire
        if(cote===home){ mulH*=0.78; mulA*=dDef; } else { mulA*=0.78; mulH*=dDef; }
      }
      const pool=rouge?(gardien?COMM.crGK:COMM.cr):(gardien?COMM.cjGK:COMM.cj);
      ev.push({m,t:rouge?"crd":"occ",ic:rouge?"cr":"cj",c:{cote:cote.id,nom:j.nom,rouge,gardien,uid:j.uid},
        x:fmtC(PICK(pool),j,cote)+" ("+cote.id+")"});
    }

    if(verbeux && Math.random()<0.0085){
      const cf=Math.random()<0.5?home:away, t=tireurDuXI(onze(cf));
      if(t) ev.push({m,t:"occ",ic:"rate",x:fmtC(PICK(COMM.cf),t,cf===home?away:home)+" ("+cf.id+")"});
    }
    if(verbeux&&m===45) ev.push({m,t:"sys",x:"MI-TEMPS. "+home.id+" "+sh+" - "+sa+" "+away.id});
  }
  if(verbeux){ ev.push({m:90,t:"sys",x:"COUP DE SIFFLET FINAL. "+home.nom+" "+sh+" - "+sa+" "+away.nom});
    annoteButs(ev); }
  return {sh,sa,ev,aff};
}

/* Recolle un nouveau cours de match à partir de l'index non encore joué (fromIdx) : annule les stats du tail
   pré-tiré, repart du score affiché et re-simule. Mute monMatch (r.ev, r.sh, r.sa) en place. */
function rejoueDepuis(r,h,a,fromIdx,mNow,mulH,mulA){
  for(let k=fromIdx;k<r.ev.length;k++){ const l=r.ev[k];
    if(l.g){ const b=l.g.uid&&byUid(l.g.uid); if(b) b.buts=Math.max(0,(b.buts||0)-1);
      const p=l.g.pasUid&&byUid(l.g.pasUid); if(p) p.passes=Math.max(0,(p.passes||0)-1); }
    if(l.c&&l.c.rouge&&l.c.uid){ const j=byUid(l.c.uid); if(j) j.susp=Math.max(0,(j.susp||0)-3); }
  }
  let sh=0,sa=0; for(let k=0;k<fromIdx;k++){ const l=r.ev[k]; if(l.g){ if(l.g.cote===h.id) sh++; else sa++; } }
  const out=simuleReste(h,a,mNow,sh,sa,mulH,mulA);
  r.ev.length=fromIdx;
  for(const e of out.ev) r.ev.push(e);
  r.ev.push({m:90,t:"sys",x:"COUP DE SIFFLET FINAL. "+h.nom+" "+out.sh+" - "+out.sa+" "+a.nom});
  r.sh=out.sh; r.sa=out.sa;
  annoteButs(r.ev); // re-décompte des buts/coups du chapeau sur tout le fil recollé
  return out;
}
function fmtC(t,j,opp){ return t.replace("{A}",j.nom).replace("{G}","le gardien").replace("{D}",opp.nom); }

function affluence(home,away,sansPromo){
  const forme=home.forme.slice(-5).reduce((a,b)=>a+b,0); // -5..+5
  // le public vient d'abord pour SON équipe : le prestige et le classement du club hôte pèsent désormais
  // davantage que ceux du visiteur (retour de playtest : « 2e avec le PSG et le stade pas plein, illogique »)
  let taux=0.46 + home.pres*0.022 + away.pres*0.016 + forme*0.028;
  const rang=classement().findIndex(c=>c.id===home.id)+1;
  if(rang>0){ if(rang<=3) taux+=0.13; else if(rang<=6) taux+=0.06; else if(rang>=16) taux-=0.06; } // jouer le titre remplit, la peur vide
  if(RIVAL[home.id]===away.id) taux+=0.15; // le derby fait toujours guichets fermés ou presque
  if(home.id===G.monClub && (G.buzz||0)>0) taux+=0.045*Math.min(3,G.buzz); // une recrue fait vendre des billets
  if(home.id===G.monClub && G.reput!=null) taux+=(G.reput-60)*0.0016; // un club respecté attire, un club décrié lasse
  if(home.id===G.monClub && G.stade){ if(G.stade.ecran) taux+=0.02; if(G.stade.pylones) taux+=0.015; } // le spectacle et les soirs de match remplissent un peu plus
  if(home.id===G.monClub) taux*=palierBillet().aff; // votre politique tarifaire : brader remplit, faire payer cher vide
  // opération « tribunes scolaires » : on remplit un stade qui s'annonçait à moitié vide (places bradées, voir finirJournee)
  if(home.id===G.monClub && G.promoBillets && !sansPromo) taux=Math.max(taux+0.30, 0.92);
  return Math.round(home.cap*Math.max(0.30, Math.min(1, taux)));
}

/* ---------- Journée de championnat ---------- */
function clubById(id){ return G.clubs.find(c=>c.id===id) || (G.autre&&G.autre.find(c=>c.id===id)); }
function appliqueResultat(h,a,sh,sa,pre){
  h.j++; a.j++; h.bp+=sh; h.bc+=sa; a.bp+=sa; a.bc+=sh;
  if(sh>sa){h.pts+=3;h.g++;a.p++;h.forme.push(1);a.forme.push(-1);}
  else if(sh<sa){a.pts+=3;a.g++;h.p++;a.forme.push(1);h.forme.push(-1);}
  else {h.pts++;a.pts++;h.n++;a.n++;h.forme.push(0);a.forme.push(0);}
  const entre=(c,pick)=>{
    const sel=pick||tireSubs(c);
    sel.xi.forEach(j=>{j.matchs++; j._joue=1;
      const niv=(c.id===G.monClub)?G.centre:1;
      let proba=(0.011+0.0022*(j.fragile||5))*(1-0.07*(niv-1));
      if(c.id===G.monClub) proba*=(1-0.12*coachTier("physique")); // préparateur physique : moins de pépins musculaires
      if(Math.random()<proba){
        let d=RNDI(1, 2+Math.round((j.fragile||5)*0.9));
        d=Math.max(1, Math.round(d*(1-0.10*(niv-1))));
        j.bless=d;
        if(c.id===G.monClub){ G.news.unshift("INFIRMERIE : "+j.nom+" touché — indisponible "+d+" journée"+(d>1?"s":"")+".");
          notif("🏥 "+j.nom+" blessé — indisponible "+d+" journée"+(d>1?"s":"")+"."); }
      }});
    sel.banc.forEach(j=>{j.matchs++; j._joue=0.6;});
    return sel.banc;
  };
  return {subsH:entre(h,pre&&pre.h), subsA:entre(a,pre&&pre.a)};
}
function tireSubs(c){
  const xi=onze(c);
  return {xi, banc:c.joueurs.filter(j=>!xi.includes(j)&&dispo(j)).sort(()=>Math.random()-.5).slice(0,3)};
}

function notif(t){ (G.notifs=G.notifs||[]).push(t); }
function majReput(delta, raison){
  G.reput=Math.max(0,Math.min(100,(G.reput==null?75:G.reput)+delta));
  if(delta) notif((delta>0?"🕊️ Réputation +":"⚠️ Réputation ")+delta+(raison?" ("+raison+")":"")+" → "+Math.round(G.reput)+"/100");
}
function jouerJournee(evCb){
  G.notifs=[];
  G.offreExt=null; G.offrePret=null; // les offres de la semaine passée expirent
  const day=G.calendrier[G.journee];
  const res=[];
  let monMatch=null, pend=null;
  for(const [hid,aid] of day){
    const h=clubById(hid), a=clubById(aid);
    const mien=(hid===G.monClub||aid===G.monClub);
    const r=simuleMatch(h,a,mien);
    if(mien && G.truque){ // la mallette a parlé : victoire garantie
      const dom=hid===G.monClub;
      if(!(dom?r.sh>r.sa:r.sa>r.sh)){
        const moi=dom?h:a, but=tireur(moi), p=passeur(moi,but);
        but.buts++; if(p)p.passes++;
        if(dom) r.sh=r.sa+1; else r.sa=r.sh+1;
        const fin=r.ev.pop();
        r.ev.push({m:88,t:"but",ic:"but",g:{cote:(dom?h:a).id,but:but.nom,pas:p?p.nom:null,sh:r.sh,sa:r.sa},x:but.nom+" surgit dans un silence étrange... BUT. La défense adverse semble pétrifiée. ("+h.id+" "+r.sh+"-"+r.sa+")"});
        r.ev.push(fin); fin.x="COUP DE SIFFLET FINAL. "+h.nom+" "+r.sh+" - "+r.sa+" "+a.nom;
      }
      G.truque=false; G.risque=RNDI(4,7); // l'enquête reste chaude 4 à 7 journées, puis la piste se refroidit
      r._truque=true; // victoire arrangée : pas de re-sim tactique en direct (elle effacerait le résultat acheté)
      G.news.unshift("L'intermédiaire a disparu dans la nuit. La victoire est là. Dormez bien... si vous le pouvez.");
    }
    if(!mien){
      appliqueResultat(h,a,r.sh,r.sa);
      res.push({h,a,sh:r.sh,sa:r.sa});
      continue;
    }
    // ----- mon match : tout est différé jusqu'au coup de sifflet (penalty possible à la 90e) -----
    monMatch=r;
    const pre={h:tireSubs(h), a:tireSubs(a)};
    const lignes=[];
    pre.h.banc.forEach((j,k)=>lignes.push({m:57+k*8+RNDI(0,3),t:"occ",ic:"sub",x:"Changement pour "+h.nom+" : "+j.nom+" entre en jeu."}));
    pre.a.banc.forEach((j,k)=>lignes.push({m:60+k*8+RNDI(0,3),t:"occ",ic:"sub",x:"Changement pour "+a.nom+" : "+j.nom+" entre en jeu."}));
    const fin=r.ev.pop();
    r.ev=r.ev.concat(lignes).sort((x,y)=>x.m-y.m); r.ev.push(fin);
    // un moment de match à l'ultime seconde ?
    const moi=hid===G.monClub?h:a, adv=hid===G.monClub?a:h;
    if(Math.random()<0.26){
      r.moment=tireMoment(moi,adv);
      if(r.moment){
        const sifflet=r.ev.pop();
        r.ev.push({m:90,t:"crd",x:r.moment.annonce,mo:r.moment.type});
        r.ev.push(sifflet);
      }
    }
    const e={h,a,sh:r.sh,sa:r.sa,mien:true};
    res.push(e);
    pend={r,h,a,hid,aid,pre,e};
  }
  G._pend={res,pend,monMatch};
  if(!pend){ finirJournee(null); return {res,monMatch}; }
  // Match joué AU TÉLÉSCRIPTEUR (window._diffEnDirect) et sans moment : on DIFFÈRE la finalisation jusqu'au coup
  // de sifflet, pour que le changement de tactique en direct puisse re-simuler la fin avant que rien ne soit acté.
  // Le harnais (EN_TEST) et le résultat instantané finalisent ici, comme avant → calibrage et tests intacts.
  if(!pend.r.moment){ if(EN_TEST() || !(typeof window!=="undefined"&&window._diffEnDirect)) finirJournee(null); }
  else if(EN_TEST() || !MOMENTS_INTERACTIFS[pend.r.moment.type]){
    finirJournee(autoMoment(pend.r.moment)); // tests et moments non interactifs : résolution immédiate
  }
  return {res,monMatch};
}

const MOMENTS_INTERACTIFS={pen_pour:1,pen_contre:1,coupfranc:1,tacle:1,provoc:1};
const MOMENTS_BUT={but50:1,geste:1,cagade:1,cadeau:1,gkbut:1}; // moments non interactifs qui changent le score (résolus avant le direct)

// qui ne donnent rien. La « grosse action » en blanc ne garantit donc plus le but — le suspense est rendu :
// on ne sait qu'à la résolution si ça rentre (ligne jaune) ou si ça fuit (occasion ratée, ligne cyan).
// Étape 1 — l'action s'installe (ambiance, défense qui recule). Étape 2 — un joueur nommé arme le geste décisif.

    if(prov) return {type:"provoc", uid:prov.uid,
      annonce:"GRISÉ PAR L'AMBIANCE, "+prov.nom.toUpperCase()+" CHARRIE LE PUBLIC ADVERSE... Les tribunes grondent, l'arbitre s'approche."};
  }
  if(t<0.75){ // but venu d'ailleurs : gardien adverse trop avancé, frappe de 50 mètres
    const tir=xiM.filter(j=>"MA".includes(j.pos)).sort((a,b)=>b.note-a.note)[0];
    if(tir) return {type:"but50", uid:tir.uid,
      annonce:"INCROYABLE ! Le gardien adverse est monté, "+tir.nom.toUpperCase()+" arme de 50 MÈTRES... le ballon retombe sous la barre — BUT VENU D'AILLEURS !"};
  }
  if(t<0.82){ // geste technique d'exception
    const tir=xiM.filter(j=>"MA".includes(j.pos)).sort((a,b)=>b.note-a.note)[0];
    if(tir){ const gestes=["un RETOURNÉ ACROBATIQUE","une REPRISE DE VOLÉE pleine lucarne","un COUP DU SCORPION improbable","une talonnade aérienne"];
      return {type:"geste", uid:tir.uid, geste:PICK(gestes),
      annonce:tir.nom.toUpperCase()+" inscrit un but d'anthologie — "+PICK(gestes)+" ! Le stade entier se lève."};
    }
  }
  if(t<0.88){ // cagade : VOTRE gardien se troue, but encaissé sec (Arconada, relance dans les pieds...)
    const gk=xiM.find(j=>j.pos==="G");
    const benef=PICK(xiA.filter(j=>j.pos==="A"))||PICK(xiA.filter(j=>"MA".includes(j.pos)))||xiA[xiA.length-1];
    if(gk&&benef){ const desc=PICK(CAGADES)(gk.nom);
      return {type:"cagade", uid:benef.uid, gk:gk.uid,
        annonce:"🧤 CAGADE DE "+gk.nom.toUpperCase()+" ! "+desc+" — "+benef.nom+" pousse au fond. BUT CONTRE "+moi.nom.toUpperCase()+" À LA 90ᵉ !"};
    }
  }
  if(t<0.94){ // cadeau : le gardien ADVERSE se troue, but offert
    const gk=xiA.find(j=>j.pos==="G");
    const benef=PICK(xiM.filter(j=>j.pos==="A"))||PICK(xiM.filter(j=>"MA".includes(j.pos)))||xiM[xiM.length-1];
    if(gk&&benef){ const desc=PICK(CAGADES)(gk.nom);
      return {type:"cadeau", uid:benef.uid, gk:gk.uid,
        annonce:"🎁 CADEAU DU GARDIEN ADVERSE ! "+desc+" — "+benef.nom.toUpperCase()+" ne se fait pas prier. BUT POUR "+moi.nom.toUpperCase()+" À LA 90ᵉ !"};
    }
  }
  if(t<0.955){ // le gardien monte sur le dernier corner du temps additionnel... et MARQUE ! (freak absolu, but sec pour vous)
    const gk=xiM.find(j=>j.pos==="G");
    if(gk) return {type:"gkbut", uid:gk.uid,
      annonce:"RENVERSANT ! Dernier corner, temps additionnel : votre gardien "+gk.nom.toUpperCase()+" est monté... et c'est LUI qui catapulte le ballon au fond ! LE GARDIEN MARQUE, DE BUT À BUT !"};
  }
  if(t<0.97){
    const gk=xiM.find(j=>j.pos==="G");
    if(!gk) return null;

      annonce:"Votre gardien "+gk.nom+" reste au sol après un choc... Un défenseur enfile les gants pour les arrêts de jeu."};
  }
  // pur décor (aucun effet sur le score) : l'envahisseur à quatre pattes, le pigeon assommé, ou l'intrus en bottes
  const decor=PICK(["chien","pigeon","streaker"]);
  if(decor==="pigeon") return {type:"pigeon",
    annonce:"UN PIGEON EN PLEIN VOL ! Une frappe dévissée cueille le volatile, qui pique du nez sur la pelouse — sonné mais vivant. On l'évacue sur une civière miniature, et tout le stade l'ovationne !"};
  if(decor==="streaker") return {type:"streaker",
    annonce:"UN INTRUS SUR LA PELOUSE ! En tenue d'Adam et bottes en caoutchouc, il tente le tour d'honneur — trois stadiers le plaquent au rond central. Même l'arbitre se retient de rire."};
  return {type:"chien",
    annonce:"UN CHIEN SUR LA PELOUSE ! Il slalome entre les stadiers, tribunes pliées de rire. Personne n'arrive à l'attraper."};
}
function autoMoment(mo){ // résolution sans intervention (tests, abandon de banc, moments non interactifs)
  if(mo.type==="pen_pour")   return Math.random()<(0.74+0.04*coachTier("cpa")) ? +1 : 0; // le spécialiste CPA aiguise la conversion
  if(mo.type==="pen_contre") return Math.random()<(0.70-0.03*coachTier("gardien")) ? -1 : 0; // un bon coach des gardiens en sauve davantage
  if(mo.type==="coupfranc"){ const j=byUid(mo.uid); const el=!!(j&&j.tireurElite); // un spécialiste transforme bien plus souvent
    return Math.random()<((el?0.30:0.09)+0.04*coachTier("cpa")) ? +1 : 0; }
  if(mo.type==="tacle"){ const j=byUid(mo.uid); if(j) j.susp=(j.susp||0)+3; return 0; }
  if(mo.type==="provoc"){ const j=byUid(mo.uid); if(j && Math.random()<0.4) j.susp=(j.susp||0)+1; return 0; }
  if(mo.type==="but50" || mo.type==="geste" || mo.type==="gkbut"){ // but d'exception (gardien buteur inclus) : il compte, et il marque les esprits
    const j=byUid(mo.uid);
    if(j){ j.moral=Math.min(100,(j.moral||65)+6); }
    if(G) G.buzz=Math.min(4,(G.buzz||0)+1);
    return +1;
  }
  if(mo.type==="cagade"){ const g=byUid(mo.gk); if(g) g.moral=Math.max(0,(g.moral||65)-8); return -1; } // votre gardien encaisse, et l'a mauvaise
  if(mo.type==="cadeau"){ const b=byUid(mo.uid); if(b) b.moral=Math.min(100,(b.moral||65)+5); if(G) G.buzz=Math.min(4,(G.buzz||0)+1); return +1; } // cadeau du portier d'en face
  return 0;
}

function finirJournee(delta){
  const P=G._pend; if(!P) return; G._pend=null;
  const {res,pend}=P;
  if(G.coupe && G.coupe.fatigue>0) G.coupe.fatigue--; // la fatigue de coupe se dissipe après le match qu'elle a plombé
  if(pend){
    const {r,h,a,hid,aid,pre,e}=pend;
    if(r.moment && delta){
      const t=byUid(r.moment.uid);
      if(delta>0){ if(hid===G.monClub) r.sh++; else r.sa++; }
      else       { if(hid===G.monClub) r.sa++; else r.sh++; }
      if(t) t.buts++;
      e.sh=r.sh; e.sa=r.sa;
    }
    if(r.moment && r.moment.type==="gants"){ const g=byUid(r.moment.gk||r.moment.uid); if(g) g.bless=RNDI(2,4); }
    if(r.moment && r.moment.type==="chien"){ clubById(G.monClub).joueurs.forEach(j=>j.moral=Math.min(100,(j.moral||65)+1)); }
    appliqueResultat(h,a,r.sh,r.sa,pre);
    // finances : billetterie à domicile + droits TV + sponsor
    if(hid===G.monClub){
      const aff=affluence(h,a), pb=palierBillet();
      let recette, libBill;
      if(G.promoBillets){
        // opération « tribunes scolaires » : les places ajoutées par la promo sont bradées (PROMO_PRIX), les autres au tarif normal
        const affNorm=affluence(h,a,true), promo=Math.max(0, aff-affNorm);
        recette=affNorm*pb.prix + promo*PROMO_PRIX;
        libBill="Billetterie + OPÉ SCOLAIRES ("+FMT(promo)+" places à "+PROMO_PRIX+" FF) : "+FMT(aff)+" spectateurs, recette "+(recette/1e6).toFixed(2)+" MF.";
        // le geste envers le quartier fait monter la réputation, et ce gain est ACQUIS : il ne redescend pas parce qu'on
        // arrête la promo (seuls les mauvais résultats, le tarif, etc. peuvent éroder la réputation ensuite). Cumulable.
        if(promo>0) majReput(2, "opération tribunes scolaires");
        G.promoBillets=false; // opération ponctuelle : à réactiver au prochain match
      } else {
        recette=aff*pb.prix;
        libBill="Billetterie ("+pb.nom.toLowerCase()+", "+pb.prix+" FF) : "+FMT(aff)+" spectateurs, recette "+(recette/1e6).toFixed(2)+" MF.";
      }
      G.tresorerie += recette;
      if(G.stade && G.stade.loges){ G.tresorerie += 150000; libBill+=" + loges VIP 0,15 MF."; } // recette premium des loges, à domicile
      G.news.unshift("J"+(G.journee+1)+" — "+libBill);
      // l'image du club glisse selon le tarif (cher = râleries, bradé = ferveur) — discret, mais cumulatif sur la saison
      if(pb.rep) G.reput=Math.max(0,Math.min(100,(G.reput==null?75:G.reput)+pb.rep));
      // le moral du vestiaire suit le tarif ET le remplissage : un stade plein porte, un stade vide plombe
      const fill=Math.min(1, aff/Math.max(1,h.cap)), nudge=pb.moral+(fill-0.70)*0.8;
      if(nudge) clubById(G.monClub).joueurs.forEach(j=>j.moral=Math.max(0,Math.min(100,(j.moral==null?65:j.moral)+nudge)));
      G.affHist=(G.affHist||[]).concat(fill).slice(-8); // mémoire glissante du remplissage à domicile (jauge + gradins de l'écran Club)
    }
    G.tresorerie += (G.div===1?450000:200000); // droits TV par journée — bien moindres en D2 : remonter, c'est aussi décrocher le jackpot télé
    if(G.stade && G.stade.boutique) G.tresorerie += 80000; // boutique & musée : petite rentrée chaque journée
    const gagneJ=(hid===G.monClub&&r.sh>r.sa)||(aid===G.monClub&&r.sa>r.sh);
    if(G.equip){ G.tresorerie += G.equip.fixe; if(gagneJ&&G.equip.prime) G.tresorerie += G.equip.prime; } // contrat équipementier
    if(G.sponsor){
      if(G.sponsor.defaut && Math.random()<G.sponsor.defaut){
        notif("💸 "+G.sponsor.nom+" n'a pas versé son dû cette journée. Les relances restent sans réponse.");
      } else {
        G.tresorerie += G.sponsor.fixe;
        if(gagneJ&&G.sponsor.prime){ G.tresorerie+=G.sponsor.prime;
          G.news.unshift(G.sponsor.nom+" verse la prime de victoire : "+(G.sponsor.prime/1e6).toFixed(2)+" MF."); }
      }
      // le sponsor du terroir entretient l'image chaque journée (bonus de réputation RÉCURRENT, appliqué en silence
      // comme la dérive du tarif billet) — c'est lui qui rend le « petit » sponsor un vrai choix face au pont d'or
      if(G.sponsor.repJ) G.reput=Math.max(0,Math.min(100,(G.reput==null?75:G.reput)+G.sponsor.repJ));
    }
    const masse=clubById(G.monClub).joueurs.reduce((s,j)=>s+salaire(j),0);
    const frais=fraisJournee(clubById(G.monClub)); // entretien du stade + personnel
    const staffC=staffCoutJournee(); // salaires du staff technique
    G.tresorerie -= masse + frais + staffC;
    // préparateur mental : entretient le moral du vestiaire chaque journée
    const mtC=coachTier("mental");
    if(mtC) clubById(G.monClub).joueurs.forEach(j=>j.moral=Math.min(100,(j.moral==null?65:j.moral)+0.4*mtC));
    // prime de match : promesse au vestiaire, honorée UNIQUEMENT en cas de victoire (proportionnelle à la masse
    // salariale et au niveau choisi). Puis remise à zéro : c'est un choix à reprendre à chaque match.
    if(+G.primeMatch>0){
      if(gagneJ){ const cout=Math.round(masse*G.primeMatch*3);
        G.tresorerie-=cout;
        G.news.unshift("PRIME DE MATCH honorée (victoire, "+Math.round(G.primeMatch*100)+" %) : "+(cout/1e6).toFixed(2)+" MF reversés aux joueurs.");
        notif("💰 Prime de victoire versée : "+(cout/1e6).toFixed(2)+" MF.");
      }

    }
    if(G.tresorerie<0){ // le découvert agace le président : l'argent redevient une contrainte
      G.confiance=Math.max(0,G.confiance-1);
      if(!G._deficit){ G._deficit=true; notif("🔴 Trésorerie dans le rouge. Le président veut un retour à l'équilibre — alléger la masse salariale, vendre, ou décrocher un meilleur sponsor."); }
    } else if(G.tresorerie>2e6){ G._deficit=false; }
  }
  // moral : temps de jeu et résultat du club humain
  majMoral(res);
  // un joueur prêté à l'extérieur a un temps de jeu garanti : il progresse comme un titulaire
  G.prets.filter(p=>p.sens==="out").forEach(p=>{ const j=byUid(p.uid); if(j){ j._joue=1; j.moral=Math.min(100,(j.moral==null?65:j.moral)+1.5); } }); // titulaire ailleurs : il joue et reprend du poil de la bête

      notif("⚖️ L'AFFAIRE A ÉCLATÉ : 6 points de pénalité, 8 MF d'amende.");

    } else if(--G.risque<=0){

  if(!G.affaire && !G.risque && !G.truque && G.journee>2 && G.journee<36 && Math.random()<(enDangerMal?0.085:0.04)){

        G.news.unshift("MERCATO : "+ach.nom+" rafle "+entree[0]+" ("+t+") sous votre nez. Le recruteur vous avait prévenu.");
        notif("🚨 "+ach.nom+" a raflé "+entree[0]+" — il figurait dans votre rapport de recruteur.");

    if(cp){ G.confPresse=cp; G.confRecents.push({id:cp.id, j:G.journee}); }
  }
  // pas de nouvel arc le même week-end qu'un incident/conf (une seule modale) ; armeArc gère test/unicité/fenêtre
  if(!G.incident && !G.confPresse) armeArc();
  coupeTick(); // tour de Coupe de France en semaine, s'il est à l'heure
  euroTick();  // tour de Ligue des Champions en semaine, s'il est à l'heure
  if(G.journee>=38) finDeSaison();
  assureCapitaine(); // si le capitaine est parti (transfert, blessure longue, incident), on en renomme un
  sauvegardeLocale(true); // sauvegarde auto en fin de journée
}

/* ---------- Les incidents de la vie du club ---------- */
/* Chaque incident cible un joueur, propose 2-3 choix, chaque choix applique des effets
   (argent, moral du joueur, moral du groupe, confiance du président, note) et renvoie une issue. */
function eff(j, e){
  const moi=clubById(G.monClub);
  if(e.arg)   G.tresorerie += e.arg;
  if(e.conf)  G.confiance = Math.max(0,Math.min(100,G.confiance+e.conf));
  if(e.moral) j.moral = Math.max(5,Math.min(100,(j.moral||65)+e.moral));
  if(e.note){ j.note = Math.max(40,j.note+e.note); if(e.note>0&&j.pot<j.note)j.pot=j.note; }
  if(e.susp)  j.susp = (j.susp||0)+e.susp;
  if(e.bless) j.bless= (j.bless||0)+e.bless;
  if(e.groupe) moi.joueurs.forEach(x=>{ if(x!==j) x.moral=Math.max(5,Math.min(100,(x.moral||65)+e.groupe)); });
  if(e.ego)   j.ego = Math.max(1,Math.min(10,(j.ego||5)+e.ego));
  if(e.brassard){ moi.joueurs.forEach(x=>x.capitaine=false); j.capitaine=true; }
  if(e.vend){ // le joueur s'en va, on encaisse une indemnité
    const prix=Math.round(valeur(j)*(e.vend)/1e5)*1e5;
    moi.joueurs=moi.joueurs.filter(x=>x!==j);
    const dest=PICK(ETR_ACHETEURS.concat(G.clubs.filter(c=>c.id!==G.monClub).map(c=>c.nom)));
    G.budget+=prix;
    G.news.unshift("DÉPART : "+j.nom+" file à "+dest+" pour "+(prix/1e6).toFixed(1)+" MF.");
    notif("💸 DÉPART : "+j.nom+" quitte le club pour "+dest+" ("+(prix/1e6).toFixed(1)+" MF).");
  }
}

function anneeJeu(){ return (G.anBase||1995)+(G.saisonIdx||1)-1; } // année civile de DÉBUT de la saison en cours ; anBase = 1re saison de la carrière (1995 par défaut, 1996 si départ en 96/97…)
function recoitAuProchainMatch(){
  const jour=G.calendrier&&G.calendrier[G.journee];
  if(!jour) return false;
  const paire=jour.find(([x,y])=>x===G.monClub||y===G.monClub);
  return paire && paire[0]===G.monClub; // le club à domicile est le premier de la paire
}
function tireIncident(){
  const moi=clubById(G.monClub);
  const dispos=moi.joueurs.filter(j=>!j.pretOut);
  if(dispos.length<3) return null;
  const an=anneeJeu();
  const recents=(G.incidentsRecents||[]).map(r=>r.id);
  let cands=INCIDENTS.filter(inc=>{
    if(inc.de && an<inc.de) return false;   // pas encore d'actualité à cette époque
    if(inc.a  && an>inc.a)  return false;    // anachronisme dépassé
    if(recents.includes(inc.id)) return false; // déjà vu il y a peu : on évite la redite
    const cible=dispos.find(inc.test||(()=>true));
    return !!cible;
  });
  // si tout a été vu récemment (cas rare), on relâche la contrainte de fraîcheur
  if(!cands.length){
    cands=INCIDENTS.filter(inc=>{
      if(inc.de && an<inc.de) return false;
      if(inc.a  && an>inc.a)  return false;
      return !!dispos.find(inc.test||(()=>true));
    });
  }
  if(!cands.length) return null;
  let tp=Math.random()*cands.reduce((s,c)=>s+(c.poids||1),0), inc=cands[0];
  for(const c of cands){ tp-=(c.poids||1); if(tp<=0){ inc=c; break; } }
  if(inc.duo){
    const pool=dispos.slice().sort(()=>Math.random()-.5);
    const j=pool[0], k=pool.find(x=>x!==j);
    if(!k) return null;
    return {inc, j, k};
  }
  // pondération : les jeunes font plus de bêtises, les bons gestes touchent tout le monde
  const pool=dispos.filter(inc.test||(()=>true));
  const poids=pool.map(j=>{
    let p=1;
    if(inc.pondJeune && j.age<=23) p*=inc.pondJeune;
    if(inc.id==="boite"||inc.id==="ibiza"||inc.id==="cadeau") p*=1+((j.venal||5)+(j.ego||5))/20;
    return p;
  });
  let t=Math.random()*poids.reduce((a,b)=>a+b,0), j=pool[0];
  for(let i=0;i<pool.length;i++){ t-=poids[i]; if(t<=0){ j=pool[i]; break; } }
  return {inc, j};
}

function majMoral(res){
  const moi=clubById(G.monClub);
  const monRes=res.find(r=>r.mien);
  let resultat=0;
  if(monRes){
    const dom=monRes.h.id===G.monClub;
    resultat=(dom?monRes.sh-monRes.sa:monRes.sa-monRes.sh);
  }
  for(const j of moi.joueurs){
    let d=(65-(j.moral==null?65:j.moral))*0.10; // tout s'estompe, l'euphorie comme la déprime
    if(j._joue){ d+=1.5; j.sansJouer=0; }
    else { j.sansJouer=(j.sansJouer||0)+1;
      if(j.sansJouer===3) notif("😞 "+j.nom+" cire le banc depuis 3 matchs — son moral décroche.");
      if(j.sansJouer>=3) d-=((j.ego||5)>=7?5:3); }
    d += resultat>0?2:(resultat<0?-3:0.5);
    j.moral=Math.max(5,Math.min(100,(j.moral==null?65:j.moral)+d));
  }
}
function selections(){
  const moi=clubById(G.monClub);
  for(const j of moi.joueurs){
    if((j.nat||"FR")!=="FR") continue;
    if(j.note>=84 && !j.selA){
      j.selA=true; j.moral=Math.min(100,(j.moral||65)+8);
      G.news.unshift("ÉQUIPE NATIONALE : "+j.nom+" honore sa première sélection nationale !");
      notif("🌍 "+j.nom+" appelé en ÉQUIPE NATIONALE — première sélection !");
      G.presse.unshift("« "+j.nom+" en sélection — la récompense d'un travail de club remarquable. »");
    } else if(j.selA && !j.butSel && j.pos!=="G" && Math.random()<0.3){
      j.butSel=true; j.moral=Math.min(100,(j.moral||65)+5);
      G.news.unshift("TRÊVE INTERNATIONALE : premier but en équipe nationale pour "+j.nom+" !");
      notif("🌍 Premier but en sélection pour "+j.nom+" !");
    } else if(j.selA){
      j.moral=Math.min(100,(j.moral||65)+4); // revenir de Clairefontaine fait toujours du bien
      if(j.age<=24 && j.note<j.pot && Math.random()<0.18){
        j.note++; G.news.unshift(j.nom+" revient grandi de la sélection — un cap est franchi (note "+j.note+").");
      }
    } else if(j.age<=21 && j.note>=76 && !j.selEsp){
      j.selEsp=true; j.moral=Math.min(100,(j.moral||65)+5);
      G.news.unshift("ESPOIRS : "+j.nom+" ("+j.age+" ans) appelé en équipe nationale Espoirs.");
      notif("🌍 "+j.nom+" ("+j.age+" ans) convoqué chez les Espoirs.");
    }
  }
}

/* ---------- Revue de presse ---------- */
function genPresse(res){
  const t=[], cl=classement();
  for(const r of res){
    const d=Math.abs(r.sh-r.sa);
    if(d>=4) t.push("Correction au stade "+r.h.stade+" : "+(r.sh>r.sa?r.h.nom:r.a.nom)+" écrase son adversaire ("+r.sh+"-"+r.sa+").");
    else if(r.sh<r.sa && r.h.pres-r.a.pres>=4) t.push("Sensation ! "+r.a.nom+" fait tomber "+r.h.nom+" chez lui.");
    else if(r.sh>r.sa && r.a.pres-r.h.pres>=4) t.push("Exploit de "+r.h.nom+" face au grand "+r.a.nom+" !");
  }
  if(G.journee>=5) t.push(cl[0].nom+" en tête avec "+cl[0].pts+" points — pour combien de temps ?");
  const meil=G.clubs.flatMap(c=>c.joueurs).sort((a,b)=>b.buts-a.buts)[0];
  if(meil && meil.buts>=Math.max(5,G.journee*0.5)) t.push(meil.nom+" ("+clubById(meil.club).nom+"), le serial buteur que toute l'Europe surveille.");
  const moi=clubById(G.monClub);
  if(G.confiance<25 && !G.vire) t.push("À "+moi.nom+", le président ne dément plus les rumeurs de limogeage...");
  else if(moi.forme.length>=3 && moi.forme.slice(-3).every(x=>x===1)) t.push(moi.nom+" enchaîne les victoires — les supporters rêvent à voix haute.");
  t.sort(()=>Math.random()-.5);
  G.presse=t.slice(0,3).map(x=>"« "+x+" »").concat(G.presse).filter((x,i,a)=>a.indexOf(x)===i).slice(0,6);
}

/* ---------- Conférence de presse interactive ----------
   On vous tend le micro autour d'un fait saillant (un adversaire qui vous a chambré, un derby qui vient,
   une série, la course au titre ou au maintien, un scandale, un président qui doute). Vous choisissez le
   TON de votre réponse ; chaque ton déplace le moral du vestiaire, la réputation du club, la confiance du
   président, le buzz, et alimente la revue de presse. Aucun effet sur le calibrage : tout est appliqué AU
   CLIC du joueur, donc le harnais (qui ne rend pas les modales) n'y touche jamais. */
function effConf(e, c){
  const moi=c.moi;
  if(e.moral)  moi.joueurs.forEach(j=>j.moral=Math.max(5,Math.min(100,(j.moral==null?65:j.moral)+e.moral)));
  if(e.reput)  majReput(e.reput, "conférence de presse");
  if(e.conf)   G.confiance=Math.max(0,Math.min(100,G.confiance+e.conf));
  if(e.buzz)   G.buzz=Math.min(4,(G.buzz||0)+e.buzz);
  if(e.presse) G.presse.unshift("« "+e.presse+" »");
}
function ctxPresse(){
  const moi=clubById(G.monClub);
  const jour=G.calendrier[G.journee];
  const paire=jour&&jour.find(([x,y])=>x===G.monClub||y===G.monClub);
  const adv=paire?clubById(paire[0]===G.monClub?paire[1]:paire[0]):null;
  const cl=classement(); const rang=cl.findIndex(c=>c.id===G.monClub)+1;
  const f=(moi.forme||[]).slice(-3);
  return {moi, adv, rang, n:G.clubs.length,
    derby: !!(adv && RIVAL[moi.id]===adv.id),
    troisV: f.length>=3 && f.every(x=>x===1),
    troisD: f.length>=3 && f.every(x=>x===-1),
    declar: G.declar};
}

function tireConfPresse(){
  const c=ctxPresse();
  let elig=CONF_PRESSE.filter(e=>{ try{ return e.cond(c); }catch(_){ return false; } });
  if(!elig.length) return null;
  const recents=(G.confRecents||[]).map(r=>r.id);
  let pool=elig.filter(e=>!recents.includes(e.id));
  if(!pool.length) pool=elig;
  const e=pool[0]; // priorité = ordre du catalogue
  return {id:e.id, q:e.q(c), reps:e.rep(c)}; // tout résolu en chaînes/objets simples (sérialisable)
}

/* ---------- La mallette ---------- */
function accepterAffaire(){
  if(!G.affaire) return;
  if(G.tresorerie<G.affaire.prix) return alert("Trésorerie insuffisante. L'intermédiaire ne fait pas crédit.");
  G.tresorerie-=G.affaire.prix; G.truque=true; G.affaire=null;
  G.news.unshift("Une mallette a changé de main dans un parking. Le prochain match vous sourira.");
  montre("calendrier");
}
function refuserAffaire(){
  G.affaire=null; G.confiance=Math.min(100,G.confiance+3);
  G.news.unshift("Vous éconduisez l'intermédiaire. Votre conscience est intacte — votre classement, lui, devra se débrouiller.");
  montre("calendrier");
}

/* ---------- Progression des jeunes / déclin ---------- */
function progression(){
  for(const c of G.clubs) for(const j of c.joueurs){
    const part=j._joue||0; delete j._joue;
    if(j.age<=23 && j.pot>j.note){
      const banc = j.age<=18 ? 0.09 : 0.045; // centre de formation pour les très jeunes
      const niv=(c.id===G.monClub)?G.centre:1;
      const gain = Math.max(0.11*part, banc*0.85) * (1+(j.pot-j.note)/40) * (1+0.10*(niv-1));
      j.prog=(j.prog||0)+gain;
      if(j.prog>=1){ j.note=Math.min(j.pot, j.note+Math.floor(j.prog)); j.prog%=1;
        if(c.id===G.monClub) G.news.unshift(j.nom+" progresse ! Note : "+j.note+".");
      }
    } else if(j.age>=31 && Math.random()<0.05){ j.note=Math.max(50,j.note-1); }
  }
}

/* ---------- Mercato ---------- */
function fenetreOuverte(){ return G.journee<5 || (G.journee>=19 && G.journee<=23); }
function msgMercato(){
  if(G.journee<5) return "MERCATO D'ÉTÉ OUVERT — fermeture après la J5 ("+(5-G.journee)+" journée"+(5-G.journee>1?"s":"")+" restante"+(5-G.journee>1?"s":"")+")";
  if(G.journee>=19&&G.journee<=23) return "MERCATO D'HIVER OUVERT — fermeture après la J24 ("+(24-G.journee)+" journée"+(24-G.journee>1?"s":"")+" restante"+(24-G.journee>1?"s":"")+")";
  if(G.journee<19) return "Mercato fermé — réouverture en janvier (J20 à J24)";
  return "Mercato fermé jusqu'à la fin de la saison";
}
function prixAchat(j){ const v=valeur(j); return Math.round(v*(j.note>=85?1.6:1.3)); }
function acheter(j){
  const prix=prixAchat(j);
  if(j.pretIn||j.pretOut) return alert("Ce joueur est en cours de prêt : intransférable.");
  if(!fenetreOuverte()) return alert("Le mercato est fermé. Prochaine fenêtre : janvier (J20-J24).");
  if(prix>G.budget) return alert("Budget transferts insuffisant ("+(G.budget/1e6).toFixed(1)+" MF disponibles).");
  // le joueur (surtout s'il est vénal ou vedette) réclame une prime à la signature, payée cash
  const venal=(j.venal||5);
  if(venal>=5 || j.note>=80){
    const prime=Math.round(prix*(0.04+0.012*venal)/1e5)*1e5;
    return demandePrime(j, prix, prime);
  }
  finaliseAchat(j, prix, 0);
}
function demandePrime(j, prix, prime){
  const fiche=document.getElementById("fiche");
  const cash=G.tresorerie;
  fiche.innerHTML=`<div class="fbox" style="max-width:460px;background:#0b1626;border:2px solid #ffd24a;box-shadow:0 0 40px rgba(0,0,0,.85);padding:14px">

    <p class="dim">Trésorerie disponible : ${(cash/1e6).toFixed(1)} MF.</p>
    <div style="margin-top:10px">
      <button class="big" id="bPrimeOk" style="display:block;width:100%;margin:6px 0" ${cash<prime?"disabled":""}>Payer la prime (${(prime/1e6).toFixed(2)} MF cash)${cash<prime?" — trésorerie insuffisante":""}</button>
      <button class="big" id="bPrimeNeg" style="display:block;width:100%;margin:6px 0">Négocier (l'agent peut se braquer)</button>

    </div><div id="primeRes"></div></div>`;
  fiche.style.display="flex"; window._penEnCours=true;
  const fin=()=>{ window._penEnCours=false; fermeFiche(); };
  document.getElementById("bPrimeOk").onclick=()=>{ fin(); finaliseAchat(j,prix,prime); };
  document.getElementById("bPrimeNon").onclick=()=>{ fin(); G.news.unshift("Transfert avorté : la prime exigée par "+j.nom+" a fait capoter l'affaire."); rafraichir(); };
  document.getElementById("bPrimeNeg").onclick=()=>{
    const r=Math.random();
    const div=document.getElementById("primeRes");
    document.querySelectorAll("#bPrimeOk,#bPrimeNeg,#bPrimeNon").forEach(b=>b.disabled=true);
    if(r<0.5){ // accepte une prime réduite
      const reduite=Math.round(prime*0.5/1e5)*1e5;
      if(G.tresorerie<reduite){ div.innerHTML=`<p class="rouge" style="margin-top:8px">L'agent baisse à ${(reduite/1e6).toFixed(2)} MF... mais même ça, vous ne l'avez pas en caisse.</p><p style="margin-top:8px"><button class="big" id="bX">Tant pis</button></p>`; div.querySelector("#bX").onclick=()=>{fin();G.news.unshift("Transfert de "+j.nom+" abandonné, faute de liquidités.");rafraichir();}; return; }
      div.innerHTML=`<p class="vert" style="margin-top:8px">L'agent cède : prime ramenée à ${(reduite/1e6).toFixed(2)} MF. Beau travail.</p><p style="margin-top:8px"><button class="big" id="bX">Signer</button></p>`;
      div.querySelector("#bX").onclick=()=>{ fin(); finaliseAchat(j,prix,reduite); };
    } else { // se braque
      div.innerHTML=`<p class="rouge" style="margin-top:8px">L'agent claque la porte : « Mon joueur ira voir ailleurs. » Le transfert tombe à l'eau.</p><p style="margin-top:8px"><button class="big" id="bX">Encaisser l'échec</button></p>`;
      div.querySelector("#bX").onclick=()=>{ fin(); G.news.unshift("Négociation rompue : "+j.nom+" ne signera pas."); rafraichir(); };

}
function finaliseAchat(j, prix, prime){
  const vendeur=clubById(j.club), acheteur=clubById(G.monClub);
  vendeur.joueurs=vendeur.joueurs.filter(x=>x!==j);
  const rgn=Object.assign(genJoueur(j.pos,vendeur.pres),{club:vendeur.id,buts:0,passes:0,matchs:0,avendre:false,fav:false,titu:false,uid:uidGen()});
  rgn.note0=rgn.note;
  vendeur.joueurs.push(rgn);
  j.club=G.monClub; j.titu=false; acheteur.joueurs.push(j);
  G.budget-=prix; if(prime) G.tresorerie-=prime;
  G.buzz=Math.min(4,(G.buzz||0)+2); // la ville parle de la recrue
  // une star mercenaire (gros ego + vénalité) heurte les puristes ; un joueur de devoir séduit
  if((j.ego||5)>=8 && (j.venal||5)>=7) majReput(-4, "recrue mercenaire");
  else if((j.ego||5)<=3 && (j.venal||5)<=3) majReput(+2, "recrue exemplaire");
  G.news.unshift("TRANSFERT : "+j.nom+" rejoint le club pour "+(prix/1e6).toFixed(1)+" MF"+(prime?" (+ "+(prime/1e6).toFixed(2)+" MF de prime à la signature)":"")+".");
  rafraichir();
}
function listerVente(j){ j.avendre=!j.avendre; montre("effectif"); }
function venteEclair(j){
  if(j.pretIn) return alert("Ce joueur est prêté par un autre club : impossible de le vendre.");
  const prix=Math.round(valeur(j)*0.6/1e5)*1e5;
  if(!confirm("Vente éclair de "+j.nom+" pour "+(prix/1e6).toFixed(1)+" MF (décote de 40 %) ?\nDépart immédiat, même hors mercato.")) return;
  const moi=clubById(G.monClub);
  moi.joueurs=moi.joueurs.filter(x=>x!==j);
  const dest=PICK(G.clubs.filter(c=>c.id!==G.monClub));
  j.club=dest.id; j.avendre=false; j.titu=false; dest.joueurs.push(j);
  G.budget+=prix;
  G.news.unshift("VENTE ÉCLAIR : "+j.nom+" bradé à "+dest.nom+" pour "+(prix/1e6).toFixed(1)+" MF.");
  notif("💰 VENDU : "+j.nom+" bradé à "+dest.nom+" pour "+(prix/1e6).toFixed(1)+" MF (vente éclair).");
  // brader un cadre fidèle (ancien, capitaine, ou international maison) abîme l'image
  if(j.capitaine || j.selA || (j.matchs||0)>=38) majReput(-6, "départ forcé d'un cadre");
  fermeFiche();
  rafraichir();
}

/* ---------- Prêts ---------- */
function byUid(uid){
  for(const c of G.clubs) for(const j of c.joueurs) if(j.uid===uid) return j;
  return null;
}
function tarifPret(j){ return Math.max(20000, Math.round(valeur(j)*0.0020/1e4)*1e4); } // appoint, pas une rente : prêter libère surtout le salaire et du temps de jeu
function modalPret(j, sens){ // sens: "in" = emprunter, "out" = prêter
  const maxD=Math.min(15, 37-G.journee);
  if(maxD<3) return alert("Trop tard dans la saison pour un prêt.");
  const tarif=tarifPret(j);
  const durees=[5,10,15].filter(d=>d<=maxD);
  // destination crédible : un club où il jouera vraiment (prestige inférieur au vôtre)
  let hote=null;
  if(sens==="out"){
    const moi=clubById(G.monClub);
    const faibles=G.clubs.filter(c=>c.id!==G.monClub && c.pres<=moi.pres);
    const pool=(faibles.length?faibles:G.clubs.filter(c=>c.id!==G.monClub)).sort((a,b)=>a.pres-b.pres).slice(0,6);
    hote=PICK(pool);
  }
  fiche.style.display="flex";
  fiche.innerHTML=`<div class="card">
    <h2>${sens==="in"?"Emprunter":"Prêter"} ${esc(j.nom)}</h2>
    <p>${sens==="in"
      ?"Le joueur rejoint votre effectif pour la durée choisie, contre une indemnité par journée."
      :"Le joueur part jouer ailleurs — temps de jeu garanti, sa progression s'accélère, et le club hôte paie une indemnité par journée."}</p>
    ${sens==="out"?`<p style="margin-top:6px">Destination proposée : <b class="jaune">${esc(hote.nom)}</b> <span class="dim">(prestige ${hote.pres}/10 — il y jouera titulaire)</span>. Libre à vous de refuser et de retenter plus tard.</p>`:""}
    <p style="margin-top:8px">Durée :
      <select id="selD">${durees.map(d=>`<option value="${d}">${d} journées</option>`).join("")}</select>
      · Indemnité : <b class="jaune">${FMT(tarif)} FF / journée</b> ${sens==="in"?"(à payer)":"(encaissée)"}</p>
    <p style="margin-top:12px">
      <button class="act" id="bOkP">Confirmer le prêt</button>
      <button class="act" id="bF">Annuler</button></p>
  </div>`;
  document.getElementById("bF").onclick=()=>fiche.style.display="none";
  document.getElementById("bOkP").onclick=()=>{
    const d=+document.getElementById("selD").value;
    if(sens==="in") empruntJoueur(j,d,tarif); else preteJoueur(j,d,tarif,hote);
  };
  fiche.onclick=e=>{ if(e.target===fiche) fiche.style.display="none"; };
}
function empruntJoueur(j,d,tarif){
  if(!fenetreOuverte()){ alert("Les prêts entrants se négocient pendant les fenêtres de mercato."); return; }
  const proprio=clubById(j.club), moi=clubById(G.monClub);
  proprio.joueurs=proprio.joueurs.filter(x=>x!==j);
  j.pretIn=true; j.club=G.monClub; moi.joueurs.push(j);
  G.prets.push({uid:j.uid, sens:"in", proprio:proprio.id, fin:G.journee+d, tarif});
  G.news.unshift("PRÊT : "+j.nom+" arrive de "+proprio.nom+" pour "+d+" journées ("+FMT(tarif)+" FF/j).");
  fermeFiche(); rafraichir();
}
function preteJoueur(j,d,tarif,hote){
  if(j.pretIn) return alert("Ce joueur est déjà en prêt chez vous.");
  const moi=clubById(G.monClub);
  hote=hote||PICK(G.clubs.filter(c=>c.id!==G.monClub && c.pres<=moi.pres))||PICK(G.clubs.filter(c=>c.id!==G.monClub));
  moi.joueurs=moi.joueurs.filter(x=>x!==j);
  j.pretOut=true; j.titu=false; j.club=hote.id; hote.joueurs.push(j);
  G.prets.push({uid:j.uid, sens:"out", hote:hote.id, fin:G.journee+d, tarif});
  G.news.unshift("PRÊT : "+j.nom+" part s'aguerrir à "+hote.nom+" pour "+d+" journées (+"+FMT(tarif)+" FF/j).");
  fermeFiche(); rafraichir();
}
function retourPret(p){
  const j=byUid(p.uid); if(!j) return;
  const porteur=clubById(j.club);
  porteur.joueurs=porteur.joueurs.filter(x=>x!==j);
  const dest=clubById(p.sens==="in"?p.proprio:G.monClub);
  delete j.pretIn; delete j.pretOut; j.titu=false; j.club=dest.id;
  dest.joueurs.push(j);
  if(p.sens==="out"){
    // un prêt, c'est du temps de jeu garanti ailleurs : le joueur revient grandi (expérience en accéléré).
    // Les jeunes profitent le plus ; on ne dépasse jamais le potentiel, et la note ne peut que monter.
    const av=j.note, gain=(j.age<=21?3:j.age<=25?2:1), plafond=Math.max(j.note,j.pot||j.note);
    j.note=Math.min(plafond, j.note+gain);
    j.moral=Math.min(100,(j.moral==null?65:j.moral)+12);
    G.news.unshift("RETOUR DE PRÊT : "+j.nom+" revient au club, aguerri"+(j.note>av?" — la pige a payé : note "+av+" → "+j.note:"")+".");
  }
  else G.news.unshift("FIN DE PRÊT : "+j.nom+" retourne à "+dest.nom+".");
}
function traiterPrets(){
  for(const p of G.prets.slice()){
    if(p.sens==="in") G.tresorerie-=p.tarif; else G.tresorerie+=p.tarif;
    if(G.journee>=p.fin){ retourPret(p); G.prets.splice(G.prets.indexOf(p),1); }
  }
}

/* Offre d'achat sur un de vos joueurs PRÊTÉS (sortant) : il brille ailleurs, son club d'accueil veut lever l'option
   et le garder à demeure. Le joueur vit déjà dans l'effectif de l'hôte → accepter = on supprime le prêt et on entérine
   la vente (l'argent file au budget transferts). Refuser = le prêt suit son cours, il vous reviendra à l'échéance. */
function genOffrePret(){
  if(!G.prets) return null;
  const cands=G.prets.filter(p=>p.sens==="out").map(p=>({p, j:byUid(p.uid)}))
    .filter(x=>x.j && (x.j.note>=70 || (x.j.pot||0)>=80)); // un prêté qui a de la valeur fait envie
  if(!cands.length) return null;
  const {p,j}=PICK(cands), hote=clubById(p.hote);
  // l'acheteur : souvent le club d'ACCUEIL (il le côtoie tous les jours), mais parfois un AUTRE club qui l'a flairé
  // pendant son prêt — un prêté n'est plus « bloqué », il peut être convoité par un tiers.
  let acq=hote, interlope=false;
  if(Math.random()<0.4){
    const autres=(G.clubs||[]).concat(G.autre||[]).filter(c=>c&&c.id!==G.monClub&&c.id!==p.hote);
    if(autres.length){ acq=PICK(autres); interlope=true; }
  }
  // prix proche de la valeur ; un tiers paie un peu plus cher (concurrence avec le club d'accueil)
  const base=Math.max(valeur(j), valeur({...j, note:Math.round((j.note+(j.pot||j.note))/2)}));
  const prix=Math.round(base*RND(interlope?1.15:1.0, interlope?1.6:1.45)/1e5)*1e5;
  return {uid:j.uid, acq:acq?acq.id:p.hote, host:p.hote, interlope, club:acq?acq.nom:"son club d'accueil", prix};
}
function accepterOffrePret(){
  const o=G.offrePret; if(!o){ return; }
  const j=byUid(o.uid), idx=G.prets.findIndex(p=>p.uid===o.uid && p.sens==="out");
  if(!j || idx<0){ G.offrePret=null; montre("calendrier"); return; }
  const pret=G.prets[idx], cibleId=o.acq||o.host||pret.hote;
  const detenteur=clubById(pret.hote), acq=clubById(cibleId);
  G.prets.splice(idx,1);            // le prêt devient une vente sèche : il ne reviendra pas
  if(detenteur) detenteur.joueurs=detenteur.joueurs.filter(x=>x!==j); // on le retire du club d'accueil...
  delete j.pretOut; j.titu=false; j.avendre=false; j.club=cibleId;
  if(acq && !acq.joueurs.includes(j)) acq.joueurs.push(j);            // ...pour l'envoyer chez l'acheteur (l'hôte ou un tiers)
  G.budget+=o.prix; G.offrePret=null;
  G.news.unshift("VENTE : "+j.nom+" (prêté) est transféré à "+o.club+" pour "+(o.prix/1e6).toFixed(1)+" MF.");
  notif("💸 "+j.nom+" vendu à "+o.club+" : "+(o.prix/1e6).toFixed(1)+" MF au budget transferts.");
  montre("calendrier");
}
function refuserOffrePret(){
  const o=G.offrePret; G.offrePret=null;
  const j=o?byUid(o.uid):null;
  if(j) G.news.unshift("Option déclinée : "+j.nom+" reste sous contrat, son prêt suit son cours et il vous reviendra.");
  montre("calendrier");
}
/* ---------- Marché des transferts entre clubs IA (pendant les fenêtres) ---------- */
/* Un club IA se renforce en achetant un joueur à un autre club, dans la limite de son budget.
   Jamais à votre club (on vous fait des offres pour ça) ; le vendeur garde toujours son ossature. */
function transfertIA(){
  const acheteurs=G.clubs.filter(c=>c.id!==G.monClub && (c.budget||0)>=8e6 && c.joueurs.length<22);
  if(!acheteurs.length) return;
  const ach=PICK(acheteurs);
  const posCible=PICK(["G","D","M","A"]);
  const mesPos=ach.joueurs.filter(j=>j.pos===posCible).sort((a,b)=>a.note-b.note);
  const faible=mesPos.length?mesPos[0].note:60; // son plus faible à ce poste : on cherche mieux
  const cand=[];
  for(const c of G.clubs){
    if(c.id===ach.id||c.id===G.monClub) continue;
    const atPos=c.joueurs.filter(j=>j.pos===posCible).sort((a,b)=>b.note-a.note);
    if(atPos.length<=CIBLE[posCible]) continue;     // le vendeur garde son ossature (ses CIBLE meilleurs)
    for(const j of atPos.slice(CIBLE[posCible])){   // seul le surplus est vendable (jamais les titulaires)
      if(j.pretIn||j.pretOut) continue;
      if(j.note<=faible) continue;                  // doit renforcer l'acheteur
      const prix=prixAchat(j);
      if(prix<=ach.budget) cand.push({j,c,prix});
    }
  }
  if(!cand.length) return;
  cand.sort((a,b)=>b.j.note-a.j.note);
  const {j,c,prix}=cand[Math.min(cand.length-1,RNDI(0,2))];
  c.joueurs=c.joueurs.filter(x=>x!==j);
  j.club=ach.id; j.titu=false; j.avendre=false; ach.joueurs.push(j);
  ach.budget-=prix; c.budget=(c.budget||0)+Math.round(prix*0.9);
  G.news.unshift("MERCATO : "+ach.nom+" recrute "+j.nom+" ("+c.nom+") pour "+(prix/1e6).toFixed(1)+" MF.");
  if(Math.random()<0.4) G.presse.unshift("« "+ach.nom+" frappe un grand coup : "+j.nom+" débarque de "+c.nom+". »");
}

/* ---------- Vases communicants : budget transferts ↔ trésorerie ---------- */
/* Les deux poches restent séparées (le trésor de guerre du mercato ne sert pas à payer les salaires),
   mais on peut transvaser de l'une à l'autre pour débloquer un projet — au prix d'une commission, pour
   que ce soit un vrai arbitrage et pas un jonglage gratuit. FRAIS_VIRE est un réglage tunable. */
const FRAIS_VIRE=0.10; // commission de conversion : transvaser n'est jamais à 100 %
function transvaser(sens, montant){
  // sens "caisse" : budget transferts → trésorerie ; sens "mercato" : trésorerie → budget transferts
  if(!(montant>0)) return;
  const source = sens==="caisse" ? G.budget : G.tresorerie;
  if(montant>source) return alert("Montant supérieur à la poche de départ ("+(source/1e6).toFixed(1)+" MF disponibles).");
  const recu=Math.round(montant*(1-FRAIS_VIRE)), perte=montant-recu;
  if(sens==="caisse"){ G.budget-=montant; G.tresorerie+=recu; }
  else               { G.tresorerie-=montant; G.budget+=recu; }
  G.news.unshift("TRANSVASEMENT : "+(montant/1e6).toFixed(1)+" MF "+(sens==="caisse"?"du mercato vers la caisse de fonctionnement":"de la caisse vers le budget transferts")+" — "+(recu/1e6).toFixed(1)+" MF arrivés à bon port, "+(perte/1e6).toFixed(1)+" MF de frais.");
  if(G.tresorerie>2e6) G._deficit=false; // un renflouement suffisant éteint l'alerte de découvert
  montre("finances");
}

function genRapport(){
  if(!G.vivier){ // copie de travail : un joueur signé disparaît du vivier
    const enJeu=new Set(); // un joueur déjà sous contrat (selon la saison de départ choisie) ne traîne pas aussi dans le vivier
    for(const c of G.clubs.concat(G.autre||[])) for(const jj of (c.joueurs||[])) enJeu.add(jj.nom);
    G.vivier={};
    for(const t in VIVIER) G.vivier[t]=VIVIER[t].l.filter(e=>!enJeu.has(e[0])).map(e=>e.slice());
  }
  const types=Object.keys(G.vivier).filter(t=>G.vivier[t].length>0);
  const choix=types.sort(()=>Math.random()-.5).slice(0,3);
  const out=[];
  for(const t of choix){
    const e=PICK(G.vivier[t]);
    const j={nom:e[0],pos:e[1],age:e[2],note:e[3],pot:e[4],lieu:e[5],
             buts:0,passes:0,matchs:0,avendre:false,fav:false,titu:false,club:"EXT",uid:uidGen(),bless:0,susp:0,
             reel:true, moral:RNDI(58,75), sansJouer:0,
             nat:(t.includes("Division 2")||t.includes("come-back")||["E. Cantona"].includes(e[0]))?"FR":"ETR"};
    j.note0=j.note;
    initTraits(j);
    out.push({j, type:t, prix:Math.round(valeur(j)*VIVIER[t].m/1e5)*1e5});
  }
  return out;
}

function datedDispo(liste){
  const an=anneeJeu();

}

  const ech=clubById(G.monClub).pres*0.09+0.55;

/* offres d'équipementier selon la notoriété — comme les sponsors : rien tant qu'on n'a pas signé */
function genEquip(){
  const c=clubById(G.monClub);
  const standing=c.pres + Math.max(-1.5, Math.min(1.5, ((G.reput==null?75:G.reput)-75)/20));
  const elig=EQUIPEMENTIERS.filter(e=>standing>=e.min && standing<=e.max).sort((a,b)=>b.cachet-a.cachet);
  const ordre=elig.length?elig:[EQUIPEMENTIERS[EQUIPEMENTIERS.length-1]];
  const base=120000*(0.65+0.05*c.pres), rnd=x=>Math.round(x/1000)*1000;
  const prem=ordre[0];
  const iPrem=EQUIPEMENTIERS.indexOf(prem);
  const chal=ordre[1] || EQUIPEMENTIERS[iPrem+1] || EQUIPEMENTIERS[iPrem-1] || prem;
  const loc=EQUIPEMENTIERS[EQUIPEMENTIERS.length-1]; // l'atelier local, modeste mais aimé
  const offres=[
    {nom:prem.nom, fixe:rnd(base*prem.cachet),        prime:0,                          rep:0,  note:prem.note, desc:"le gros contrat — fixe maximal"},
    {nom:chal.nom, fixe:rnd(base*chal.cachet*0.72),   prime:rnd(base*chal.cachet*0.55),  rep:0,  note:chal.note, desc:"moins de fixe, mais une prime à chaque victoire"},
  ];
  if(loc.nom!==prem.nom && loc.nom!==chal.nom)
    offres.push({nom:loc.nom, fixe:rnd(base*0.22), prime:0, rep:+1, note:loc.note, desc:"l'atelier du coin — modeste, mais le public et la région l'adorent"});
  return offres;
}

  G.equip=G.offresEquip[k]; G.offresEquip=null;
  if(G.equip.rep) majReput(G.equip.rep, "Équipementier "+G.equip.nom);
  G.news.unshift("ÉQUIPEMENTIER : "+G.equip.nom+" habille le club ("+FMT(G.equip.fixe)+" FF/journée"+(G.equip.prime?" + "+FMT(G.equip.prime)+" FF par victoire":"")+").");

}

// → aucune sauvegarde ne change d'aspect ; les conforts (écran/loges/boutique/chauffante) restent à bâtir pour tous.
function inferStade(c){ return { toit:(c?c.cap:0)>=30000, pylones:(c?c.cap:0)>=18000, ecran:false, loges:false, boutique:false, chauffante:false, cote:0 }; }
function projetById(id){ return STADE_PROJETS.find(x=>x.id===id); }
function nomChantier(){ const p=G.chantier&&projetById(G.chantier.id); return p?(p.label?p.label(clubById(G.monClub)):p.nom):"Tribune"; }
function lanceProjet(id){
  const c=clubById(G.monClub), p=projetById(id);
  if(!p) return;
  if(G.chantier) return alert("Un chantier est déjà en cours (livraison dans "+G.chantier.reste+" journée(s)).");
  if(!p.dispo(c)) return;
  const cout=p.cout(c);
  if(G.tresorerie<cout) return alert("Trésorerie insuffisante (coût : "+(cout/1e6).toFixed(1)+" MF). Astuce : transvasez du budget transferts vers la caisse depuis l'écran Finances.");
  G.tresorerie-=cout;
  G.chantier={reste:p.duree, id:id};
  G.news.unshift("TRAVAUX : "+(p.label?p.label(c):p.nom)+" — chantier lancé à "+c.stade+". Livraison dans "+p.duree+" journées.");
  montre("club");
}
function avanceChantier(){
  if(!G.chantier) return;
  G.chantier.reste--;
  if(G.chantier.reste<=0){
    const c=clubById(G.monClub), p=projetById(G.chantier.id);
    let msg;
    if(p){ msg=p.applique(c); if(p.pres) c.pres=Math.min(10,(c.pres||0)+p.pres); }
    else { c.cap+=(G.chantier.places||3000); c.pres=Math.min(10,(c.pres||0)+1); msg=c.stade+" passe à "+FMT(c.cap)+" places."; } // ancien chantier « places »
    G.news.unshift("✅ "+msg);
    G.chantier=null;
  }
}

}

const ROTATION_COUPE={ // votre gestion de l'effectif pour le tour de semaine — un vrai arbitrage
  cadres: {mult:1.04, label:"Les cadres",   desc:"On joue le coup à fond — mais jambes lourdes au prochain match de championnat."},
