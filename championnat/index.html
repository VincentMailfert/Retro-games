function migre(){
  G.rapport=G.rapport||[]; G.sponsor=G.sponsor||null;
  G.offresSponsor=G.offresSponsor||null; G.sponsorSwitch=!!G.sponsorSwitch;
  G.prets=G.prets||[]; G.vivier=G.vivier||null;
  G.saisonIdx=G.saisonIdx||1; G.confiance=G.confiance==null?65:G.confiance;
  G.presse=G.presse||[]; G.affaire=G.affaire||null; G.truque=!!G.truque; G.risque=+G.risque||0; G.consigne=G.consigne||"equilibre"; G.prixBillet=(G.prixBillet==null?2:G.prixBillet);
  G.d2=G.d2||[]; G.palmares=G.palmares||[]; G.recap=G.recap||null; G.vire=G.vire||null;
  G.poolPromus=G.poolPromus||[];
  G.centre=G.centre||1; G.offreExt=G.offreExt||null;
  G.notifs=G.notifs||[]; G.declar=G.declar||null; G.buzz=G.buzz||0; G.incident=G.incident||null;
  G.reput=G.reput==null?75:G.reput;
  G.equip=G.equip||null; G.offresEquip=G.offresEquip||null;
  if(!G.equip && !G.offresEquip) G.offresEquip=genEquip(); // anciennes sauvegardes : proposer des offres
  // anciennes sauvegardes mono-division : on reconstitue la division adverse
  G.div=G.div||1;
  if(!G.autre){
    const presents=new Set(G.clubs.map(c=>c.id));
    const baseAutre=(G.div===1?CLUBS_D2:CLUBS).filter(c=>!presents.has(c.id));
    G.autre=construitDivision(baseAutre, G.div===1?STARS_D2:STARS);
  }
  G.clubs.forEach(c=>{ if(c._coupTordu==null) c._coupTordu=false; });
  G.incidentsRecents=G.incidentsRecents||[]; G.eresVues=G.eresVues||[]; G.nouvelleEre=G.nouvelleEre||null;
  G.objectif=G.objectif||objectifPour(clubById(G.monClub).pres);
  for(const c of G.clubs){
    if(!c.beteNoire){ const autres=G.clubs.filter(x=>x.id!==c.id); c.beteNoire=PICK(autres).id; c.bnBattue=false; }
    for(const j of c.joueurs){
      j.passes=j.passes||0; j.fav=!!j.fav; j.titu=!!j.titu; j.note0=j.note0||j.note;
      j.uid=j.uid||uidGen(); j.bless=j.bless||0; j.susp=j.susp||0;
      if(j.moral==null) j.moral=RNDI(58,75);
      j.sansJouer=j.sansJouer||0; j.nat=j.nat||"FR";
      if(j.reel==null) j.reel=true; // les anciens fichiers ne distinguaient pas : on les traite en vrais
      initTraits(j);
    }
  }
  if(!G.coupe) coupeInit(); // vieilles sauvegardes : on ouvre la Coupe de France en cours de route
  assureCapitaine(); // vieilles sauvegardes : pas de capitaine désigné → on en nomme un
  if(G._pend){ // un moment resté en suspens se résout tout seul
    const P=G._pend, r=P.pend&&P.pend.r;
    if(r && r.pen && !r.moment) r.moment={type:"pen_pour", uid:r.pen.uid};
    finirJournee(r&&r.moment?autoMoment(r.moment):null);
  }
}

let ECRAN="calendrier", VUECLUB=null;
const EN_TEST=()=>typeof window!=="undefined"&&window.__TEST__;
function fermeFiche(){ if(window._penEnCours) return; if(fiche&&fiche.style) fiche.style.display="none"; }
function rafraichir(){ if(EN_TEST())return; if(VUECLUB) ecranClubVue(VUECLUB); else montre(ECRAN); }
function abandonneDirect(){
  if(tickerTimer){ clearTimeout(tickerTimer); tickerTimer=null; }
  if(butFlashTimer){ clearTimeout(butFlashTimer); butFlashTimer=null; }
  const bf=document.getElementById("butFlash"); if(bf) bf.remove();
  if(window._penEnCours){ window._penEnCours=false; if(fiche&&fiche.style) fiche.style.display="none"; }
  if(G && G._pend){ // un match était en cours : il se termine sans vous
    const P=G._pend;

    finirJournee(mo?autoMoment(mo):null);

function montre(ecran){
  if(EN_TEST())return;
  if(!G) return ecranAccueil();
  abandonneDirect();
  ECRAN=ecran; VUECLUB=null;
  sauvegardeLocale(true); // sauvegarde auto à chaque transition d'écran
  if(ecran==="calendrier") return ecranCalendrier();
  if(ecran==="classement") return ecranClassement();
  if(ecran==="coupe")      return ecranCoupe();
  if(ecran==="effectif")   return ecranEffectif();
  if(ecran==="mercato")    return ecranMercato();
  if(ecran==="finances")   return ecranFinances();
  if(ecran==="club")       return ecranClub();
  if(ecran==="apropos")    return ecranApropos();
}

/* panneau LED clignotant ~5 s pour les temps forts (but, carton rouge…), avec détail ;
   o = {classe, gros, sub (HTML), detail (texte)} ; onDone appelé au clic OU après 5 s */
function celebreFlash(o, onDone){
  if(EN_TEST()){ if(onDone) onDone(); return; }
  const old=document.getElementById("butFlash"); if(old) old.remove();
  const d=document.createElement("div");
  d.id="butFlash"; if(o.classe) d.className=o.classe;
  const corps=o.img
    ? `<div class="vignette"><img class="vimg" src="${o.img}" alt="">
         <div class="bandeau"><div class="gros">${o.gros}</div>${o.sub?`<div class="det">${o.sub}</div>`:""}</div>
       </div>
       ${o.detail?`<div class="dettxt">${esc(o.detail)}</div>`:""}
       <div class="hint">▸ cliquez pour continuer</div>`
    : `<div class="gros">${o.gros}</div>
       ${o.art?`<pre style="font-family:monospace;white-space:pre;line-height:1.05;font-size:14px;color:#ffd24a;margin:8px 0;text-shadow:0 0 6px rgba(255,210,74,.5)">${o.art}</pre>`:""}
       ${o.sub?`<div class="det">${o.sub}</div>`:""}
       ${o.detail?`<div class="dettxt">${esc(o.detail)}</div>`:""}
       <div class="hint">▸ cliquez pour continuer</div>`;
  d.innerHTML=`<div class="led">${corps}</div>`;
  document.body.appendChild(d);
  d.style.pointerEvents="auto";
  let fini=false;
  const fin=()=>{ if(fini) return; fini=true;
    if(butFlashTimer){ clearTimeout(butFlashTimer); butFlashTimer=null; }
    const x=document.getElementById("butFlash"); if(x) x.remove();
    if(onDone) onDone();
  };
  d.onclick=fin;
  butFlashTimer=setTimeout(fin, 5000);
}

  const corps=inc.duo?inc.txt(j,k):inc.txt(j);
  fiche.innerHTML=`<div class="fbox" style="max-width:470px;background:#0b1626;border:2px solid ${inc.bon?"#62c462":"#ffd24a"};box-shadow:0 0 40px rgba(0,0,0,.85);padding:14px">
    <h2 style="color:${inc.bon?"#62c462":"#ffd24a"}">${titres[inc.id]||"VIE DU CLUB"}</h2>
    <p style="margin:6px 0">${esc(corps)}</p>
    <div id="incChoix">${inc.choix.map((c,i)=>`<button class="big incBtn" data-i="${i}" style="display:block;width:100%;margin:6px 0;text-align:left;padding:10px 12px">${esc(c.lib)}</button>`).join("")}</div>
    <div id="incRes"></div></div>`;

    const c=inc.choix[+b.dataset.i];
    const issue=inc.duo?c.issue(j,k):c.issue(j);
    const coul=inc.bon?"#62c462":"#ffd24a";

    document.getElementById("incChoix").innerHTML=
      `<div style="display:block;width:100%;margin:6px 0;padding:10px 12px;border:2px solid ${coul};border-radius:4px;background:rgba(255,255,255,.04)">
         <span style="color:${coul}">✓ Votre décision :</span> <b>${esc(c.lib)}</b></div>`;

    document.getElementById("bIncOk").onclick=()=>{ window._penEnCours=false; G.incident=null; fermeFiche(); if(suite) suite(); };
  });
}

function lanceMatch(instant){
  // le coup d'envoi est donné : on retire les boutons d'avant-match (ils reviendront en « Prochaine journée 📆 » au sifflet)
  document.getElementById("bJouer").style.display="none";
  document.getElementById("bVite").style.display="none";
  // la consigne est un choix d'AVANT-match : une fois le coup d'envoi donné, on verrouille les boutons.
  // (le match est déjà simulé par jouerJournee ; surtout, cliquer une consigne relançait montre("calendrier")
  //  → abandonneDirect() voyait G._pend et terminait le match « sans vous ». On bloque ça à la source.)
  document.querySelectorAll(".bConsigne").forEach(b=>b.disabled=true);
  const {res,monMatch}=jouerJournee();
  const tk=document.getElementById("ticker"); tk.innerHTML="";
  const ctl=document.getElementById("ctlVitesse");
  if(ctl&&!instant){ ctl.style.display=""; tickerDelai=1600; surligneVitesse(); } // vitesse par défaut + surlignage à jour au coup d'envoi
  const lignes=monMatch.ev;
  const interactif=monMatch.moment && MOMENTS_INTERACTIFS[monMatch.moment.type];
  const penIdx=interactif?lignes.findIndex(l=>l.x===monMatch.moment.annonce):-1;
  // tableau d'affichage façon panneau de stade
  const eM=res.find(r=>r.mien);
  const pT=document.getElementById("pTableau");
  if(pT&&eM){
    pT.style.display="";
    document.getElementById("tabScore").innerHTML=
      blason(eM.h,34)+`<span class="tNom" style="text-align:right">${esc(eM.h.nom)}</span>`+
      `<span class="tSc" id="tScH">0</span><span class="tSep">—</span><span class="tSc" id="tScA">0</span>`+
      `<span class="tNom">${esc(eM.a.nom)}</span>`+blason(eM.a,34);
    document.getElementById("tabButs").innerHTML=`<div class="tCol d" id="tBuH"></div><div class="tCol" id="tBuA"></div>`;
  }
  const majTableau=l=>{
    if(!l||!l.g||!pT||!eM) return;
    document.getElementById("tScH").textContent=l.g.sh;
    document.getElementById("tScA").textContent=l.g.sa;
    const cible=l.g.cote===eM.h.id?"tBuH":"tBuA";
    document.getElementById(cible).insertAdjacentHTML("beforeend",
      `<div>⚽ ${esc(l.g.but)} ${l.m}'${l.g.pen?" (sp)":""}</div>`);
  };
  const extra=[];
  // moments-buts non interactifs (cagade, cadeau, but50, geste) : déjà résolus par finirJournee.
  // Le sifflet et la feuille de match doivent donc afficher le score final, comme pour un penalty.
  const buteurMoment=()=>{ const mo=monMatch.moment, ben=mo&&byUid(mo.uid);
    return {m:90,t:"but",ic:"but",g:{cote:ben?ben.club:eM.h.id,but:ben?ben.nom:"?",pas:null,sh:eM.sh,sa:eM.sa}}; };
  if(monMatch.moment && MOMENTS_BUT[monMatch.moment.type]){
    const sif=lignes[lignes.length-1];
    if(sif&&sif.t==="sys") sif.x="COUP DE SIFFLET FINAL. "+eM.h.nom+" "+eM.sh+" - "+eM.sa+" "+eM.a.nom;
  }
  const fin=()=>{
    if(ctl) ctl.style.display="none";
    // au coup de sifflet, le bouton d'avant-match laisse place au passage à la journée suivante
    const pa=document.getElementById("preMatchAct");
    if(pa){ pa.innerHTML='<button class="big" id="bNext">Prochaine journée 📆</button>';
      document.getElementById("bNext").onclick=()=>montre("calendrier"); }
    // feuille de match
    const toutes=lignes.concat(extra);
    const buts=toutes.filter(l=>l.g), cartons=toutes.filter(l=>l.c);
    const colBut=(cote,droite)=>buts.filter(l=>l.g.cote===cote)
      .map(l=>`<p>⚽ ${l.m}' ${esc(l.g.but)}${l.g.pas?' <span class="dim">(p. '+esc(l.g.pas)+')</span>':""}${l.g.pen?' <span class="dim">(sp)</span>':""}</p>`).join("")||'<p class="dim">—</p>';
    tk.insertAdjacentHTML("beforeend",`<div class="fmatch">
      <p class="sys" style="margin-bottom:4px">— FEUILLE DE MATCH —</p>
      <p style="text-align:center;font-size:16px"><b>${esc(eM.h.nom)} <span class="jaune">${eM.sh}</span> — <span class="jaune">${eM.sa}</span> ${esc(eM.a.nom)}</b></p>
      <div style="display:flex;gap:18px;margin-top:4px">
        <div style="flex:1;text-align:right">${colBut(eM.h.id)}</div>
        <div style="flex:1">${colBut(eM.a.id)}</div>
      </div>
      ${cartons.length?`<p style="margin-top:6px;text-align:center">${cartons.map(l=>`<span class="${l.c.rouge?"rouge":"jaune"}">▮</span> ${l.m}' ${esc(l.c.nom)} <span class="dim">(${l.c.cote})</span>`).join(" &nbsp;·&nbsp; ")}</p>`:""}
      <p class="dim" style="margin-top:6px;text-align:center">Affluence : ${FMT(monMatch.aff||0)} spectateurs — ${esc(eM.h.stade)}</p>
    </div>`);
    const autres=res.filter(r=>r.h.id!==G.monClub&&r.a.id!==G.monClub)
      .map(r=>`<p class="dim">${esc(r.h.nom)} ${r.sh} - ${r.sa} ${esc(r.a.nom)}</p>`).join("");
    tk.insertAdjacentHTML("beforeend",`<p class="sys">— Les autres résultats de la journée —</p>${autres}
      <p style="margin-top:6px"><button class="big" id="bSuite">Prochaine journée 📆</button></p>`);
    tk.scrollTop=tk.scrollHeight;
    document.getElementById("bSuite").onclick=()=>montre("calendrier");
  };
  // résolution d'un moment : delta de score, ligne de résultat, sifflet réécrit, phase B
  const resoudMoment=(delta,lx,lic,butCote,butNom,suite)=>{
    finirJournee(delta); // met à jour scores, stats, finances, presse...
    const e=res.find(r=>r.mien);
    const sifflet=lignes[lignes.length-1];
    sifflet.x="COUP DE SIFFLET FINAL. "+e.h.nom+" "+e.sh+" - "+e.sa+" "+e.a.nom;
    const penL={m:90,t:delta?"but":"occ",ic:lic,
      x:lx.replace("{SCORE}","("+e.h.id+" "+e.sh+"-"+e.sa+")"),
      g:delta?{cote:butCote,but:butNom,pas:null,sh:e.sh,sa:e.sa,pen:true}:null};
    extra.push(penL); // la feuille de match le verra, sans doubler le téléscripteur
    ajouteLigne(tk,penL); majTableau(penL);
    tk.scrollTop=tk.scrollHeight;
    suite();
  };
  if(instant){
    if(penIdx<0){ lignes.forEach(l=>{ajouteLigne(tk,l);majTableau(l);});
      if(monMatch.moment && MOMENTS_BUT[monMatch.moment.type]){ const gl=buteurMoment(); extra.push(gl); majTableau(gl); }
      fin(); return; }
    lignes.slice(0,penIdx+1).forEach(l=>{ajouteLigne(tk,l);majTableau(l);});
    ouvreMoment(monMatch,res,resoudMoment,()=>{ ajouteLigne(tk,lignes[lignes.length-1]); fin(); });
    return;
  }
  tickerDelai=1600;
  let i=0;
  const tic=()=>{
    if(i>=lignes.length){ fin(); return; }
    const lg=lignes[i];
    // montée de tension : deux battements d'anticipation avant le flash, devant un BUT (lg.g) comme devant
    // une grosse occasion flaguée (lg.q.bu) qui peut très bien ne rien donner → la montée en blanc ne « spoile »
    // plus le but. 1er temps : l'action s'installe. 2e temps : le porteur (nommé) arme son geste face au gardien.
    const monte=lg && (lg.g || (lg.q && lg.q.bu));
    if(monte && (lg._monte||0)<2){
      const etape=(lg._monte=(lg._monte||0)+1), info=lg.g||lg.q;
      let txt;
      if(etape===1){ txt=PICK(MONTEE_BUT); }
      else { const defClub=eM?(info.cote===eM.h.id?eM.a:eM.h):null; txt=PICK(MONTEE_FRAPPE)(info.but, gardienDe(defClub)); }
      ajouteLigne(tk,{m:lg.m,t:"amb",x:txt}); tk.scrollTop=tk.scrollHeight;
      tickerTimer=setTimeout(tic, Math.max(650,tickerDelai)); return;
    }
    const courante=i;
    ajouteLigne(tk,lignes[i]); majTableau(lignes[i]); i++;
    tk.scrollTop=tk.scrollHeight;
    if(courante===penIdx){
      ouvreMoment(monMatch,res,resoudMoment,()=>{ tickerTimer=setTimeout(tic,tickerDelai); });
      return;
    }
    if(lg && lg.g){ // BUT
      const contre=lg.g.cote!==G.monClub;
      celebreFlash({classe:contre?"contre":"", gros:contre?"BUT…":"⚽ BUT !",
        sub:`<b class="jaune">${esc(eM.h.nom)} ${lg.g.sh} — ${lg.g.sa} ${esc(eM.a.nom)}</b> · ${lg.m}'`,
        detail:lg.x}, ()=>{ tickerTimer=setTimeout(tic,300); });
      return;
    }
    if(lg && lg.c && lg.c.rouge){ // CARTON ROUGE
      const contre=lg.c.cote===G.monClub;
      celebreFlash({classe:"contre", gros:"🟥 CARTON ROUGE",
        sub:`<b class="jaune">${esc(lg.c.nom)}</b> · ${lg.m}'${contre?" — un des vôtres&nbsp;!":""}`,
        detail:lg.x}, ()=>{ tickerTimer=setTimeout(tic,300); });
      return;
    }
    if(lg && lg.mo && MOMENTS_BUT[lg.mo]){ // moment-but non interactif : on met le score à jour (tableau + feuille)...
      const gl=buteurMoment(); extra.push(gl); majTableau(gl);
      const cag=(lg.mo==="cagade"); // ...et tous méritent leur flash LED — un but d'anthologie autant qu'une cagade
      const titre=cag?"🧤 CAGADE !":lg.mo==="cadeau"?"🎁 CADEAU DU GARDIEN !":"🌟 BUT D'ANTHOLOGIE !";
      celebreFlash({classe:cag?"contre":"", gros:titre, img:cag?PICK(IMG_CAGADE):null,
        sub:`<b class="jaune">${esc(eM.h.nom)} ${eM.sh} — ${eM.sa} ${esc(eM.a.nom)}</b> · ${lg.m}'`,
        detail:lg.x}, ()=>{ tickerTimer=setTimeout(tic,300); });
      return;
    }
    if(lg && lg.mo==="chien"){ // l'envahisseur à quatre pattes s'affiche sur le panneau du stade
      celebreFlash({classe:"", gros:"🐕 ENVAHISSEUR DE PELOUSE", art:DOG_ART,
        sub:"Un chien sur la pelouse&nbsp;! Le match attendra.",
        detail:lg.x}, ()=>{ tickerTimer=setTimeout(tic,300); });
      return;
    }
    tickerTimer=setTimeout(tic,tickerDelai);
  };
  tic();
}

/* ---------- Les overlays des moments de match ---------- */
function ajouteLigne(tk,l){
  tk.insertAdjacentHTML("beforeend",
   `<p class="evt"><span class="min">${String(l.m).padStart(2,"0")}'</span> <span class="tx ${l.t}">${esc(l.x)}</span><span class="ico">${l.ic?ICO[l.ic]:""}</span></p>`);
}
const ZONES_PEN=[["hg","Lucarne G"],["hc","Sous la barre"],["hd","Lucarne D"],["bg","Ras de terre G"],["bc","Plein centre"],["bd","Ras de terre D"]];
function cadreMoment(titre, corps){
  const fiche=document.getElementById("fiche");
  fiche.innerHTML=`<div class="fbox" style="max-width:430px;background:#0b1626;border:2px solid #ffd24a;box-shadow:0 0 40px rgba(0,0,0,.85);padding:14px">
    <h2 class="jaune">${titre}</h2>${corps}</div>`;
  fiche.style.display="flex";
  window._penEnCours=true;
  return fiche;
}
function grilleZones(prefixe){
  return `<div style="margin:10px auto;width:330px;border:3px solid #e8e8e8;border-bottom:none;padding:4px;background:rgba(255,255,255,.04)">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">
      ${ZONES_PEN.map(z=>`<button class="act zPen" data-z="${z[0]}" style="padding:14px 4px">${prefixe}${z[1]}</button>`).join("")}
    </div></div><div id="penRes"></div>`;
}
function zoneGardien(){
  const poids={bg:.22,bd:.22,hg:.14,hd:.14,bc:.18,hc:.10};
  let r=Math.random(), zg="bd";
  for(const k in poids){ r-=poids[k]; if(r<=0){ zg=k; break; } }
  return zg;
}
function finMoment(fiche, html, onOk, choisi){
  const div=fiche.querySelector("#penRes");
  // on fige les choix : le bouton retenu s'illumine et reçoit une coche ✅, les autres s'effacent
  fiche.querySelectorAll(".zPen,.zChoix").forEach(x=>{
    x.disabled=true;
    if(!choisi) return;
    if(x===choisi){ x.classList.add("choisi"); if(!x.dataset.coche){ x.dataset.coche="1"; x.innerHTML="✅ "+x.innerHTML; } }
    else x.classList.add("ecarte");
  });
  div.innerHTML=html+`<p style="margin-top:8px"><button class="big" id="bPenOk">Reprendre le match</button></p>`;
  div.querySelector("#bPenOk").onclick=()=>{ window._penEnCours=false; fermeFiche(); onOk(); };
}

function ouvreMoment(monMatch,res,resoudre,suite){
  const mo=monMatch.moment;
  const e=res.find(r=>r.mien);
  const moi=e.h.id===G.monClub?e.h:e.a, adv=e.h.id===G.monClub?e.a:e.h;
  if(mo.type==="pen_pour")   return momentPenPour(mo,moi,adv,resoudre,suite);
  if(mo.type==="pen_contre") return momentPenContre(mo,moi,adv,resoudre,suite);
  if(mo.type==="coupfranc")  return momentCoupFranc(mo,moi,adv,resoudre,suite);
  if(mo.type==="tacle")      return momentTacle(mo,moi,resoudre,suite);
  if(mo.type==="provoc")     return momentProvoc(mo,moi,adv,resoudre,suite);
  resoudre(0,"Le match reprend son cours.","rate",null,null,suite);
}

/* La provocation au public : geste vengeur ou sang-froid */
function momentProvoc(mo,moi,adv,resoudre,suite){
  const j=byUid(mo.uid)||{nom:"votre joueur",ego:7};
  const derby=(RIVAL[moi.id]===adv.id);
  const fiche=cadreMoment("🔥 PROVOCATION AU PUBLIC",
    `<p>${esc(j.nom)} est chauffé à blanc par ${derby?"l'ambiance du derby":"les sifflets adverses"}. Le public d'en face l'insulte copieusement.</p>
     <p class="dim">Le geste qui chambre fera vibrer vos supporters... mais l'arbitre a la main sur le carton, et la Ligue regarde.</p>
     <p style="margin-top:10px">
       <button class="big zChoix" id="bGeste" style="padding:12px">🤌 Le laisser chambrer le parcage</button>
       <button class="big zChoix" id="bCalme" style="padding:12px">🧊 Lui ordonner de garder son calme</button>
     </p><div id="penRes"></div>`);
  const bGeste=document.getElementById("bGeste"), bCalme=document.getElementById("bCalme");
  bGeste.onclick=()=>{
    const r=Math.random();
    let txt,classe,lx;
    if(r<0.45){ // rien, juste l'ivresse populaire
      eff(j,{moral:+6,groupe:+2});
      txt="😎 Geste culte ! Les supporters explosent, l'arbitre ferme les yeux."; classe="vert";
      lx=j.nom+" nargue le parcage adverse sous les acclamations des siens. Image culte.";
    } else if(r<0.80){ // jaune
      txt="🟨 Carton jaune pour provocation. Ça valait peut-être le coup ?"; classe="jaune";
      lx=j.nom+" chambre le public et récolte un jaune. Les tribunes adverses hurlent.";
      eff(j,{moral:+3});
    } else { // rouge
      j.susp=(j.susp||0)+3;
      txt="🟥 ROUGE ! Le geste de trop. "+j.nom+" file aux vestiaires, 2 matchs de suspension."; classe="rouge";
      lx="ROUGE pour "+j.nom+" après son geste obscène. Le banc se prend la tête dans les mains.";
      eff(j,{moral:-4});
    }
    finMoment(fiche,`<p class="${classe}" style="font-size:16px;margin-top:8px">${txt}</p>`,
      ()=>resoudre(0,lx,r<0.80?"cj":"cr",null,null,suite), bGeste);
  };
  bCalme.onclick=()=>{
    eff(j,{moral:-1});
    finMoment(fiche,`<p class="dim" style="margin-top:8px">${esc(j.nom)} ravale sa rage et file au rond central. Le sang-froid des champions.</p>`,
      ()=>resoudre(0,j.nom+" ignore les provocations et reste concentré. Sagesse.","occ",null,null,suite), bCalme);
  };
}

/* Penalty POUR : vous tirez */
function momentPenPour(mo,moi,adv,resoudre,suite){
  const t=byUid(mo.uid);
  const gk=onze(adv).find(j=>j.pos==="G")||{note:70,nom:"le gardien"};
  const fiche=cadreMoment("PENALTY — 90ᵉ MINUTE",
    `<p><b>${esc(t.nom)}</b> (note ${t.note}) face à <b>${esc(gk.nom)}</b> (${gk.note}).</p>
     ${t.tireurElite?`<p class="cyan">🎯 Votre tireur d'élite s'avance — le sang-froid en plus.</p>`:""}
     <p class="dim">Choisissez la zone. La lucarne ne pardonne qu'aux grands joueurs — le ras de terre est plus sûr, mais le gardien le sait aussi.</p>`+grilleZones(""));
  fiche.querySelectorAll(".zPen").forEach(b=>b.onclick=()=>{
    const z=b.dataset.z, s=t.note, g=gk.note;
    const pOff=((z==="hg"||z==="hd")?Math.max(0.05,0.48-0.005*s):(z==="hc")?Math.max(0.03,0.30-0.003*s):(z==="bc")?0.02:0.04)*(t.tireurElite?0.6:1);
    const zg=zoneGardien();
    const off=Math.random()<pOff;
    let arret=false, marque=false;
    if(!off){
      if(zg===z){
        const pSave=((z==="bg"||z==="bd")?Math.min(.85,.62+(g-75)*.005):(z==="bc"?.75:(z==="hc"?.45:.30)))*(t.tireurElite?0.82:1);
        arret=Math.random()<pSave;
      }
      marque=!arret;
    }
    const lib=ZONES_PEN.find(x=>x[0]===z)[1].toLowerCase();
    finMoment(fiche,
      `<p style="margin-top:8px">${esc(gk.nom)} plonge ${zg===z?"du bon côté":"à l'opposé"}...</p>
       <p class="${marque?"vert":"rouge"}" style="font-size:18px;margin-top:4px">${marque?"⚽ BUUUT !!!":(arret?"🧤 ARRÊT DU GARDIEN !":"✗ À CÔTÉ !")}</p>`,
      ()=>{
        const lx=marque?(t.nom+" prend le gardien à contre-pied — "+lib+" — BUUUT À LA 90ᵉ !!! {SCORE}")
              :(arret?("ARRÊT DU GARDIEN !! Il avait lu le "+lib+" de "+t.nom+". Quel sang-froid !")
                     :(t.nom+" vise "+lib+"... À CÔTÉ ! Le ballon meurt en tribune."));
        resoudre(marque?+1:0, lx, marque?"but":(arret?"arret":"rate"), moi.id, t.nom, suite);
      }, b);
  });
}

/* Coup franc dangereux (16-25 m) : vous choisissez la frappe. Un tireur d'élite la met où il veut. */
function momentCoupFranc(mo,moi,adv,resoudre,suite){
  const t=byUid(mo.uid)||{nom:"le tireur",note:75};
  const gk=onze(adv).find(j=>j.pos==="G")||{note:72,nom:"le gardien"};
  const el=!!t.tireurElite, s=t.note, g=gk.note, dist=mo.dist||20;
  const fiche=cadreMoment("COUP FRANC — "+dist+" MÈTRES",
    `<p><b>${esc(t.nom)}</b> (note ${t.note}) à ${dist} m face au mur, ${esc(gk.nom)} (${gk.note}) dans les buts.</p>
     ${el?`<p class="cyan">🎯 Votre tireur d'élite est sur le ballon — il peut la mettre où il veut.</p>`
         :`<p class="dim">Aucun spécialiste des coups francs dans vos rangs : il faudra une réussite insolente.</p>`}
     <p class="dim">Comment la frapper&nbsp;?</p>
     <div style="display:grid;grid-template-columns:1fr;gap:6px;margin:8px 0">
       <button class="act zChoix" data-c="lucarne" style="padding:12px;text-align:left">Par-dessus le mur, plein lucarne <span class="dim">— spectaculaire, mais ardu</span></button>
       <button class="act zChoix" data-c="enroule" style="padding:12px;text-align:left">Enroulé au ras du poteau <span class="dim">— le coup franc classique</span></button>
       <button class="act zChoix" data-c="tendue"  style="padding:12px;text-align:left">Frappe tendue cherchant la déviation <span class="dim">— surprendre le gardien</span></button>
     </div><div id="penRes"></div>`);
  fiche.querySelectorAll(".zChoix").forEach(b=>b.onclick=()=>{
    const c=b.dataset.c;
    const base=c==="lucarne"?0.08:(c==="enroule"?0.10:0.095);
    const distF=1-Math.max(0,(dist-16))*0.02;       // plus c'est loin, plus c'est dur
    const noteF=1+((s-78)*0.012);                    // un grand frappeur cadre mieux
    const gkF=1-Math.max(0,(g-76))*0.006;            // un gardien d'exception sauve un peu plus
    let p=base*(el?3.4:1)*distF*noteF*gkF;
    p=Math.max(0.03,Math.min(0.55,p));
    const but=Math.random()<p;
    const place=c==="lucarne"?"par-dessus le mur en pleine lucarne":(c==="enroule"?"enroulé au ras du poteau":"d'une frappe tendue déviée par le mur");
    const rate=c==="lucarne"?"AU-DESSUS, d'un rien !":(c==="enroule"?"LE GARDIEN SE DÉTEND ET REPOUSSE !":"LE MUR PREND TOUT !");
    finMoment(fiche,
      `<p class="${but?"vert":"rouge"}" style="font-size:18px;margin-top:4px">${but?"⚽ EN PLEINE LUCARNE — BUUUT !!!":"✗ "+rate}</p>`,
      ()=>{
        const lx=but?(t.nom+" enroule "+place+" — COUP FRANC MAGISTRAL À "+dist+" M, BUUUT À LA 90ᵉ !!! {SCORE}")
                    :(t.nom+" tente "+place+"... "+rate.toLowerCase()+" L'occasion s'envole.");
        resoudre(but?+1:0, lx, but?"but":"rate", moi.id, t.nom, suite);
      }, b);
  });
}

/* Penalty CONTRE : vous choisissez le plongeon de votre gardien */
function momentPenContre(mo,moi,adv,resoudre,suite){
  const t=byUid(mo.uid)||{nom:"l'attaquant",note:78};
  const gk=byUid(mo.gk)||{nom:"votre gardien",note:70};
  const fiche=cadreMoment("PENALTY CONTRE VOUS — 90ᵉ MINUTE",
    `<p><b>${esc(t.nom)}</b> (note ${t.note}) face à <b>${esc(gk.nom)}</b> (${gk.note}).</p>
     <p class="dim">Vous êtes le gardien, le temps d'un instant : choisissez le plongeon. Les tireurs adorent les coins bas... mais les meilleurs osent la lucarne.</p>`+grilleZones("Plonger : "));
  fiche.querySelectorAll(".zPen").forEach(b=>b.onclick=()=>{
    const z=b.dataset.z, s=t.note, g=gk.note;
    // le tireur adverse choisit : plus il est fort, plus il ose haut
    const ph=Math.min(0.34, 0.10+0.003*(s-60));
    const r=Math.random();
    let zt;
    if(r<ph) zt=PICK(["hg","hd","hc"]);
    else zt=PICK(["bg","bd","bg","bd","bc"]);
    const pOff=(zt==="hg"||zt==="hd")?Math.max(0.05,0.48-0.005*s):(zt==="hc")?Math.max(0.03,0.30-0.003*s):(zt==="bc")?0.02:0.04;
    const off=Math.random()<pOff;
    let arret=false, but=false;
    if(!off){
      if(z===zt){
        const pSave=(zt==="bg"||zt==="bd")?Math.min(.90,.70+(g-75)*.006):(zt==="bc"?.82:(zt==="hc"?.48:.32));
        arret=Math.random()<pSave;
      }
      but=!arret;
    }
    if(arret){ gk.moral=Math.min(100,(gk.moral||65)+10); }
    const libT=ZONES_PEN.find(x=>x[0]===zt)[1].toLowerCase();
    finMoment(fiche,
      `<p style="margin-top:8px">${esc(t.nom)} frappe ${libT}${z===zt?" — vous plongez du bon côté !":" — vous êtes parti de l'autre côté..."}</p>
       <p class="${but?"rouge":"vert"}" style="font-size:18px;margin-top:4px">${but?(z===zt?"💔 BUT QUAND MÊME — la frappe était trop pure !":"💔 BUT ENCAISSÉ À LA 90ᵉ..."):(arret?"🧤 ARRÊT DE "+esc(gk.nom).toUpperCase()+" !!!":"✗ À CÔTÉ ! Le poteau vous sauve !")}</p>`,
      ()=>{
        const lx=but?(t.nom+" transforme — "+libT+" — le coup de poignard de la 90ᵉ. {SCORE}")
              :(arret?("ARRÊT DE "+gk.nom.toUpperCase()+" SUR LE PENALTY !! "+moi.stade+" explose ! Le héros du soir porte des gants.")
                     :(t.nom+" expédie son penalty À CÔTÉ ! Le stade souffle."));
        resoudre(but?-1:0, lx, but?"but":(arret?"arret":"rate"), adv.id, t.nom, suite);
      }, b);
  });
}

/* Le tacle de la discorde : contester ou subir */
function momentTacle(mo,moi,resoudre,suite){
  const j=byUid(mo.uid);
  const fiche=cadreMoment("L'ARBITRE HÉSITE — 90ᵉ MINUTE",
    `<p><b>${esc(j.nom)}</b> vient de découper son vis-à-vis. ${esc(agressLib(j.agress||5))}, jusqu'au bout.</p>

       <button class="act zChoix" id="bContester" style="padding:12px">Envoyer le capitaine contester (quitte ou double)</button>
     </p><div id="penRes"></div>`);
  const conclure=(txt, classe, lx, choisi)=>finMoment(fiche,`<p class="${classe}" style="font-size:16px;margin-top:8px">${txt}</p>`,

      "CARTON ROUGE pour "+j.nom+". Il quitte la pelouse sans un mot.", bSubir);
  };
  bContester.onclick=()=>{
    if(Math.random()<0.5){
      conclure("🟨 L'arbitre se ravise : JAUNE seulement ! Votre capitaine a sauvé son soldat.","vert",

      j.susp=(j.susp||0)+3; G.tresorerie-=1e6; G.confiance=Math.max(0,G.confiance-2);
      conclure("🟥 Rouge CONFIRMÉ — et le rapport au délégué vous coûte 1 MF d'amende. Le président fulmine.","rouge",
        "ROUGE confirmé pour "+j.nom+", et la contestation finit au rapport. L'addition sera salée.", bContester);
    }
  };
}

function nommerCapitaine(j){
  const c=clubById(G.monClub); if(!c||j.club!==G.monClub) return;
  const ego=j.ego||5, venal=j.venal||5;
  const greed=Math.max(0,(ego-5)+(venal-4)); // un cadre humble (ego/vénalité bas) ne réclame rien
  const demande=greed<=1?0:Math.min(3e6, Math.round(valeur(j)*0.01*greed/1e5)*1e5);
  const poser=(prime)=>{
    c.joueurs.forEach(x=>x.capitaine=false); j.capitaine=true;
    if(prime>0){ G.tresorerie-=prime; j.moral=Math.min(100,(j.moral||65)+10);
      c.joueurs.forEach(x=>{ if(x!==j) x.moral=Math.min(100,(x.moral||65)+1); }); } // pleinement investi, vestiaire flatté
    else if(demande>0){ j.moral=Math.max(5,(j.moral||65)-5); } // nommé sans la prime espérée : il fait la moue, et mènera mollement
    else { j.moral=Math.min(100,(j.moral||65)+6); } // honneur sincère
    G.news.unshift("BRASSARD : "+j.nom+" prend le capitanat"+(prime>0?", récompensé d'une prime de "+(prime/1e6).toFixed(1)+" MF.":"."));
    notif("©️ "+j.nom+" est votre nouveau capitaine.");
    fiche.style.display="none"; rafraichir();
  };
  fiche.style.display="flex";
  fiche.innerHTML=`<div class="card">
    <h2 class="jaune">©️ LE BRASSARD DE CAPITAINE</h2>
    <p><b>${esc(j.nom)}</b> — ${esc(libLeadership(j))}.</p>
    ${demande>0
      ?`<p class="dim">Ambitieux, il endosserait volontiers le brassard... mais réclame une prime de <b class="jaune">${(demande/1e6).toFixed(1)} MF</b>. Un capitaine pleinement investi soude le vestiaire ; vexé, il mènera du bout des lèvres.</p>`
      :`<p class="dim">Sans calcul : il serait simplement fier de mener les siens. Un meneur respecté tempère les ego et fait monter l'équipe d'un cran.</p>`}
    <p style="margin-top:10px">
      ${demande>0?`<button class="big" id="cPay" ${G.tresorerie>=demande?"":"disabled"} style="display:block;width:100%;margin:6px 0">Payer la prime — ${(demande/1e6).toFixed(1)} MF${G.tresorerie>=demande?"":" (caisse insuffisante)"}</button>`:""}
      <button class="big" id="cFree" style="display:block;width:100%;margin:6px 0">${demande>0?"Le nommer sans prime (il fera la moue)":"Lui confier le brassard"}</button>
      <button class="big" id="cNo" style="display:block;width:100%;margin:6px 0">Renoncer</button>
    </p></div>`;
  const bp=document.getElementById("cPay"); if(bp) bp.onclick=()=>poser(demande);
  document.getElementById("cFree").onclick=()=>poser(0);
  document.getElementById("cNo").onclick=()=>{ fiche.style.display="none"; };
  fiche.onclick=e=>{ if(e.target===fiche) fiche.style.display="none"; };
}

/* ---- Mercato ---- */
let MERCF={posF:"*", txtF:"", ageF:99, favSeul:false, triCle:"note", triDir:-1, divF:"*"};
function ecranMercato(){
  // état des filtres conservé entre deux rendus (achat, tri…) — voir MERCF
  let posF=MERCF.posF, txtF=MERCF.txtF, ageF=MERCF.ageF, favSeul=MERCF.favSeul, triCle=MERCF.triCle, triDir=MERCF.triDir, divF=MERCF.divF;
  const autreNum=G.div===1?2:1, autreIds=new Set((G.autre||[]).map(c=>c.id));
  const divOf=j=>autreIds.has(j.club)?autreNum:(G.div||1); // le mercato est national : D1 + D2
  const valTri=(j,k)=>k==="prix"?prixAchat(j):(k==="club"?clubById(j.club).nom:(k==="nom"?j.nom:(k==="prog"?j.note-(j.note0||j.note):j[k])));
  const rend=()=>{
    MERCF={posF,txtF,ageF,favSeul,triCle,triDir,divF}; // mémorise les filtres pour le prochain rendu
    const tous=G.clubs.concat(G.autre||[]).filter(c=>c.id!==G.monClub).flatMap(c=>c.joueurs)
      .filter(j=>!j.pretIn&&!j.pretOut)
      .filter(j=>(posF==="*"||j.pos===posF) && j.age<=ageF && (!favSeul||j.fav) && (divF==="*"||divOf(j)===+divF) && j.nom.toLowerCase().includes(txtF.toLowerCase()))
      .sort((a,b)=>{const va=valTri(a,triCle),vb=valTri(b,triCle);
        return (typeof va==="string"? va.localeCompare(vb) : va-vb)*triDir;});
    const dispo=tous.slice(0,60);
    const fl=k=>triCle===k?(triDir<0?" ▼":" ▲"):"";
    document.getElementById("listeM").innerHTML=
     `<table><tr>
        <th></th>
        <th class="click" data-c="nom">Joueur${fl("nom")}</th>
        <th>P</th>
        <th class="num click" data-c="age">Âge${fl("age")}</th>
        <th class="num click" data-c="note">Note${fl("note")}</th>
        <th class="num click" data-c="prog">Prog.${fl("prog")}</th>
        <th title="Caractère — 🎯 tireur d'élite · 👑 diva · 🤝 team player · 🪝 boucher · 🤕 en sucre · 🤑 vénal">Car.</th>
        <th class="click" data-c="club">Club${fl("club")}</th>
        <th>Div</th>
        <th class="num click" data-c="prix">Prix${fl("prix")}</th><th></th></tr>
      ${dispo.map((j,i)=>`<tr class="click" data-k="${i}">
        <td><button class="act bF" data-k="${i}" title="Suivre ce joueur">${j.fav?'<span class="jaune">★</span>':"☆"}</button></td>
        <td>${esc(j.nom)}</td><td class="pos-${j.pos}">${j.pos}</td>
        <td class="num">${j.age}</td><td class="num"><b>${j.note}</b></td>
        <td class="num">${j.note>(j.note0||j.note)?'<span class="vert">▲+'+(j.note-j.note0)+'</span>':'<span class="dim">—</span>'}</td>
        <td>${pictos(j,true)}</td>
        <td class="dim">${esc(clubById(j.club).nom)}</td>
        <td><b class="${divOf(j)===1?'jaune':'cyan'}">D${divOf(j)}</b></td>
        <td class="num">${(prixAchat(j)/1e6).toFixed(1)} MF</td>
        <td><button class="act bA" data-k="${i}" ${fenetreOuverte()?"":"disabled"}>Acheter</button>
            <button class="act bP" data-k="${i}" ${fenetreOuverte()?"":"disabled"}>Prêt</button></td></tr>`).join("")}
      </table>
      ${tous.length>60?'<p class="dim" style="margin-top:6px">'+(tous.length-60)+' autres joueurs masqués — affinez la recherche.</p>':""}`;
    document.querySelectorAll("#listeM th.click").forEach(th=>th.onclick=()=>{
      const c=th.dataset.c;
      if(triCle===c) triDir*=-1; else {triCle=c; triDir=(c==="nom"||c==="club")?1:-1;}
      rend();
    });

      if(e.target.closest(".bA")||e.target.closest(".bF")||e.target.closest(".bP"))return; ouvreFiche(dispo[+tr.dataset.k]);

    document.querySelectorAll("#listeM .bA").forEach(b=>b.onclick=()=>acheter(dispo[+b.dataset.k]));
    document.querySelectorAll("#listeM .bP").forEach(b=>b.onclick=()=>modalPret(dispo[+b.dataset.k],"in"));
    document.querySelectorAll("#listeM .bF").forEach(b=>b.onclick=()=>{dispo[+b.dataset.k].fav=!dispo[+b.dataset.k].fav; rend();});
  };
  chrome("mercato",`
   <div class="panel">
    <h2>Le rapport du recruteur <span class="dim">— recrues joker, signables hors fenêtre, offres valables cette semaine seulement</span></h2>

      ${G.rapport.map((o,k)=>`<tr class="click rj" data-k="${k}">

        <td class="pos-${o.j.pos}">${o.j.pos}</td><td class="num">${o.j.age}</td>
        <td class="num"><b>${o.j.note}</b></td><td class="dim">${esc(o.j.lieu)}</td>
        <td class="num">${(o.prix/1e6).toFixed(1)} MF</td>
        <td><button class="act bJ" data-k="${k}">Signer</button></td></tr>`).join("")}</table>`
      : '<p class="dim">Le recruteur n\'a rien à proposer cette semaine.</p>'}

    <p class="row" style="margin:8px 0">
      <input type="text" id="inpN" placeholder="Rechercher un nom..." style="min-width:180px" value="${esc(txtF)}">
      <select id="selP"><option value="*"${posF==="*"?" selected":""}>Tous postes</option><option${posF==="G"?" selected":""}>G</option><option${posF==="D"?" selected":""}>D</option><option${posF==="M"?" selected":""}>M</option><option${posF==="A"?" selected":""}>A</option></select>
      <select id="selA"><option value="99"${ageF===99?" selected":""}>Tout âge</option><option value="20"${ageF===20?" selected":""}>≤ 20 ans</option><option value="23"${ageF===23?" selected":""}>≤ 23 ans</option><option value="27"${ageF===27?" selected":""}>≤ 27 ans</option></select>
      <select id="selDiv"><option value="*"${divF==="*"?" selected":""}>D1 + D2</option><option value="1"${divF==="1"?" selected":""}>D1 seule</option><option value="2"${divF==="2"?" selected":""}>D2 seule</option></select>
      <label><input type="checkbox" id="chkF"${favSeul?" checked":""}> Mes favoris ★</label>
    </p>
    <div id="listeM"></div></div>`);
  document.getElementById("selP").onchange=e=>{posF=e.target.value;rend();};
  document.getElementById("selA").onchange=e=>{ageF=+e.target.value;rend();};
  document.getElementById("selDiv").onchange=e=>{divF=e.target.value;rend();};
  document.getElementById("chkF").onchange=e=>{favSeul=e.target.checked;rend();};
  document.getElementById("inpN").oninput=e=>{txtF=e.target.value;rend();};
  document.querySelectorAll(".bJ").forEach(b=>b.onclick=()=>acheterJoker(+b.dataset.k));
  document.querySelectorAll("tr.rj").forEach(tr=>tr.onclick=e=>{
    if(e.target.closest(".bJ"))return; ouvreFiche(G.rapport[+tr.dataset.k].j);
  });
  rend();
}

/* ---- Visuel du stade : étapes de développement ---- */
function etapeStade(cap){
  if(cap<12000) return "Stade municipal";
  if(cap<20000) return "Stade de Division 1";
  if(cap<30000) return "Grande enceinte";
  return "Enceinte internationale";
}
function svgStade(cap, chantier){
  const rangs=Math.max(1,Math.min(8,Math.round((cap-7000)/4500)+1)); // 1 à 8 rangées par tribune
  const W=440,H=320, px=120,py=95,pw=200,ph=130;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:460px;display:block;margin:0 auto" role="img" aria-label="Vue du stade">`;
  s+=`<rect width="${W}" height="${H}" fill="#060d18"/>`;
  const rang=(x,y,w,h,i,travaux)=>{
    const teinte=travaux?"#b86a2e":(i%2?"#27466e":"#1c3556");
    const trait=travaux?'stroke="#ffd24a" stroke-dasharray="4 3" stroke-width="1.4"':'stroke="#0b1626" stroke-width="1"';
    // texture sièges : fins traits verticaux
    const sieges=(w>h&&!travaux)?`<line x1="${x}" y1="${y+h/2}" x2="${x+w}" y2="${y+h/2}" stroke="#0e1d35" stroke-width="0.8" stroke-dasharray="1.5 3"/>`:"";
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${teinte}" ${trait}/>${sieges}`;
  };
  for(let i=0;i<rangs;i++){
    const o=6+i*7, t=(chantier&&i===rangs-1);
    s+=rang(px-o-6, py-o-6, pw+2*o+12, 6, i, false);               // nord
    s+=rang(px-o-6, py+ph+o, pw+2*o+12, 6, i, t);                  // sud (chantier au sud)
    s+=rang(px-o-6, py-o, 6, ph+2*o, i, false);                    // ouest
    s+=rang(px+pw+o, py-o, 6, ph+2*o, i, false);                   // est
    if(rangs>=4 && i>=2 && !t){ // angles fermés à partir de la 3e couronne
      const a=6;
      s+=`<rect x="${px-o-6}" y="${py-o-6}" width="${a}" height="${a}" fill="#1c3556"/>
          <rect x="${px+pw+o}" y="${py-o-6}" width="${a}" height="${a}" fill="#1c3556"/>
          <rect x="${px-o-6}" y="${py+ph+o}" width="${a}" height="${a}" fill="#1c3556"/>
          <rect x="${px+pw+o}" y="${py+ph+o}" width="${a}" height="${a}" fill="#1c3556"/>`;
    }
  }
  if(rangs>=6){ // toiture : liseré clair sur la couronne extérieure
    const o=6+(rangs-1)*7+6;
    s+=`<rect x="${px-o-2}" y="${py-o-2}" width="${pw+2*o+4}" height="${ph+2*o+4}" fill="none" stroke="#6fd6e8" stroke-width="1.6"/>`;
  }
  if(cap>=18000){ // quatre pylônes de projecteurs
    const o=6+rangs*7+14;
    const pyl=(x,y)=>`<g stroke="#ffd24a" stroke-width="2" fill="none">
      <line x1="${x}" y1="${y}" x2="${x}" y2="${y-14}"/>
      <line x1="${x-5}" y1="${y-14}" x2="${x+5}" y2="${y-14}"/>
      <line x1="${x-5}" y1="${y-17}" x2="${x+5}" y2="${y-17}"/></g>`;
    s+=pyl(px-o,py-o+10)+pyl(px+pw+o,py-o+10)+pyl(px-o,py+ph+o+8)+pyl(px+pw+o,py+ph+o+8);
  }
  if(chantier){ // grue
    const gx=px+pw+rangs*7+22, gy=py+ph+rangs*7;
    s+=`<g stroke="#ffd24a" stroke-width="2" fill="none">
        <line x1="${gx}" y1="${gy+10}" x2="${gx}" y2="${gy-46}"/>
        <line x1="${gx}" y1="${gy-46}" x2="${gx-34}" y2="${gy-46}"/>
        <line x1="${gx-34}" y1="${gy-46}" x2="${gx-34}" y2="${gy-30}"/></g>`;
  }
  s+=`<rect x="${px}" y="${py}" width="${pw}" height="${ph}" fill="#0f3d26" stroke="#5fd98f" stroke-width="1.5"/>`;
  s+=`<line x1="${px+pw/2}" y1="${py}" x2="${px+pw/2}" y2="${py+ph}" stroke="#5fd98f"/>`;
  s+=`<circle cx="${px+pw/2}" cy="${py+ph/2}" r="16" fill="none" stroke="#5fd98f"/>`;
  s+=`<rect x="${px}" y="${py+ph/2-26}" width="26" height="52" fill="none" stroke="#5fd98f"/>`;
  s+=`<rect x="${px+pw-26}" y="${py+ph/2-26}" width="26" height="52" fill="none" stroke="#5fd98f"/>`;
  s+=`<text x="${W/2}" y="${H-8}" text-anchor="middle" fill="#7e96b5" font-family="Consolas,monospace" font-size="11">${etapeStade(cap).toUpperCase()} · ${FMT(cap)} PLACES</text>`;
  s+=`</svg>`;
  return s;
}

     ${svgStade(c.cap, !!G.chantier)}
     <p class="ctr">${esc(c.stade)} — <b class="jaune">${FMT(c.cap)}</b> places · Prestige ${c.pres}/10</p>
     ${G.chantier?`<p class="ctr" style="color:#ffd24a">⚠ Tribune en travaux — livraison dans ${G.chantier.reste} journée${G.chantier.reste>1?"s":""} (+${FMT(G.chantier.places)} places)</p>`:""}
     <p class="ctr" style="margin-top:10px"><button class="act" id="bSt" ${G.chantier?"disabled":""}>Agrandir le stade (+3 000 places — 15 MF)</button></p>
     <h3 style="margin-top:12px">Centre d'entraînement — niveau ${G.centre}/5</h3>
     <p class="dim">Progression des jeunes +${(G.centre-1)*10} % · Blessures −${(G.centre-1)*7} % et soignées plus vite${G.centre>=3?" · Le staff médical réduit la fragilité chaque intersaison":""}</p>
     <p style="margin-top:4px"><button class="act" id="bCe" ${G.centre>=5?"disabled":""}>Améliorer le centre (niveau ${G.centre+1} — ${8*G.centre} MF)</button></p>
     <h3 style="margin-top:12px">Le président</h3>
     <p>Objectif ${esc(G.saison)} : <b class="jaune">${esc(G.objectif.label)}</b></p>
     <p>Confiance :
       <span style="display:inline-block;width:160px;height:10px;border:1px solid var(--line);vertical-align:middle">
         <span style="display:block;height:100%;width:${Math.round(G.confiance)}%;background:${G.confiance>50?"var(--vert)":(G.confiance>25?"var(--jaune)":"var(--rouge)")}"></span>
       </span> ${Math.round(G.confiance)}/100</p>
     ${G.palmares.length?`<p class="dim">Palmarès : ${esc(G.palmares.join(" · "))}</p>`:""}
     <h3 style="margin-top:12px">Réputation du club</h3>
     <p>Image : 
       <span style="display:inline-block;width:160px;height:10px;border:1px solid var(--line);vertical-align:middle">
         <span style="display:block;height:100%;width:${Math.round(G.reput==null?75:G.reput)}%;background:${(G.reput||75)>65?"var(--vert)":((G.reput||75)>40?"var(--jaune)":"var(--rouge)")}"></span>
       </span> ${Math.round(G.reput==null?75:G.reput)}/100</p>
     <p class="dim">${(G.reput||75)>=80?"Un club respecté, fidèle à ses valeurs.":((G.reput||75)>=55?"Une image honorable.":((G.reput||75)>=35?"L'image se ternit — sponsors douteux, cadres bradés...":"Réputation au plus bas. Les puristes vous ont tourné le dos."))}</p>
     <p class="dim" style="font-size:11px">Sponsors sulfureux, divas mercenaires et départs forcés de cadres écornent l'image ; recrues exemplaires et fidélité la nourrissent. Un club respecté remplit plus facilement son stade.</p>
     <h3 style="margin-top:12px">Mémoire du club</h3>
     ${RIVAL[c.id]&&clubById(RIVAL[c.id])?`<p>Rival historique : <b class="rouge">${esc(clubById(RIVAL[c.id]).nom)}</b> — ${esc(nomRivalite(c.id,RIVAL[c.id]))}. La confiance se joue aussi là.</p>`:""}
     <p>Bête noire : <b class="jaune">${esc(clubById(c.beteNoire)?clubById(c.beteNoire).nom:"—")}</b>${c.bnBattue?' <span class="vert">— signe indien brisé cette saison ✓</span>':' <span class="dim">— ils jouent toujours bien contre vous... jusqu'+"'"+'à la première victoire.</span>'}</p>
     ${MALEDICTIONS[c.id]?`<p class="dim" style="font-style:italic">« ${esc(MALEDICTIONS[c.id])} »</p>`:""}
   </div>
   <div class="panel"><h2>Buteurs &amp; passeurs</h2>
     <h3>Buteurs</h3>
     <table class="fit">${buteurs.length?buteurs.map((j,i)=>`<tr><td>${i+1}</td><td>${esc(j.nom)}</td><td class="dim">${esc(clubById(j.club)?clubById(j.club).nom:"")}</td><td class="num"><b>${j.buts}</b></td></tr>`).join(""):`<tr><td class="dim" colspan="4">Aucun but inscrit pour l'instant.</td></tr>`}</table>
     <h3>Passeurs décisifs</h3>
     <table class="fit">${passeurs.length?passeurs.map((j,i)=>`<tr><td>${i+1}</td><td>${esc(j.nom)}</td><td class="dim">${esc(clubById(j.club)?clubById(j.club).nom:"")}</td><td class="num"><b>${j.passes}</b></td></tr>`).join(""):`<tr><td class="dim" colspan="4">Aucune passe décisive pour l'instant.</td></tr>`}</table>
   </div></div>`);
  document.getElementById("bSt").onclick=agrandirStade;
  document.getElementById("bCe").onclick=ameliorerCentre;
}

/* ---------- Démarrage ---------- */
if(typeof document!=="undefined" && typeof window!=="undefined" && !window.__TEST__){
  document.addEventListener("keydown",e=>{ if(e.key==="Escape") fiche.style.display="none"; });
  ecranAccueil();
}
</script>
</body>
</html>
